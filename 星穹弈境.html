            }

            initHeroes() {
                this.heroes[0] = this.createHero({
                    name: "亚伦", voiceLine: "！骑士团集结！", baseAttack: 450, level: 1,
                    recovery: 0, HP: 6000, dualAttack: false, dualRecovery: false,
                    isAlly: true, ultimateMultiplier: 3, skillCooldown: 2,
                    critMultiplier: 3.0, critRate: 0.40, baseScore: 1,
                    defenseFactor: 0, dodgeRate: 0, primaryProfession: 0,
                    professionCounts: [1, 0, 0, 0], exist: true
                });
                this.heroes[1] = this.createHero({
                    name: "A型机", voiceLine: "指令--攻击--", baseAttack: 200, level: 1,
                    recovery: 700, HP: 5000, dualAttack: false, dualRecovery: false,
                    isAlly: false, ultimateMultiplier: 5, skillCooldown: 4,
                    critMultiplier: 5, critRate: 0.1, baseScore: 1,
                    defenseFactor: 0, dodgeRate: 0, primaryProfession: 0,
                    professionCounts: [1, 0, 0, 0], exist: true
                });
            }

            createHero(data) {
                const hp = Math.abs(data.HP);
                return {
                    ...data,
                    isAlive: true,
                    hasSkill: false,
                    attributes: { name: "", operation: 0, isAttributeLocked: false },
                    secondaryProfession: 0,
                    professionName: professions[data.primaryProfession],
                    loot: this.calculateHeroValue(data.level),
                    HP: hp,
                    maxHP: hp,
                    baseAttack: Math.abs(data.baseAttack)
                };
            }

            // 以A型机为标准的数值上限，随等级线性增长
            getStatCaps(level) {
                const lvScale = 1 + (level - 1) * 0.3; // 每级+30%上限
                return {
                    baseAttack:         Math.floor(400 * lvScale),
                    HP:                 Math.floor(8000 * lvScale),
                    maxHP:              Math.floor(8000 * lvScale),
                    recovery:           Math.floor(1200 * lvScale),
                    critRate:           Math.min(0.80, 0.30 * lvScale),
                    critMultiplier:     Math.min(10, 5.0 * lvScale),
                    ultimateMultiplier: Math.min(10, 5.0 * lvScale),
                    skillCooldown:      { min: 1, max: 8 },
                    defenseFactor:      Math.min(0.60, 0.20 * lvScale),
                    dodgeRate:          Math.min(0.50, 0.15 * lvScale),
                };
            }

            clampHeroStats(hero) {
                if (!hero) return;
                const caps = this.getStatCaps(hero.level || 1);
                hero.baseAttack       = Math.min(hero.baseAttack, caps.baseAttack);
                hero.HP               = Math.min(hero.HP, caps.HP);
                hero.maxHP            = Math.min(hero.maxHP, caps.maxHP);
                hero.recovery         = Math.min(hero.recovery, caps.recovery);
                hero.critRate         = Math.min(hero.critRate, caps.critRate);
                hero.critMultiplier   = Math.min(hero.critMultiplier, caps.critMultiplier);
                hero.ultimateMultiplier = Math.min(hero.ultimateMultiplier, caps.ultimateMultiplier);
                hero.defenseFactor    = Math.min(hero.defenseFactor, caps.defenseFactor);
                hero.dodgeRate        = Math.min(hero.dodgeRate, caps.dodgeRate);
                if (typeof caps.skillCooldown === 'object') {
                    hero.skillCooldown = Math.max(caps.skillCooldown.min, Math.min(caps.skillCooldown.max, hero.skillCooldown));
                }
            }

            calculateHeroValue(level) {
                return Math.floor(level * (Math.floor(Math.random() * 100)));
            }

            updateResourceBar() {
                document.getElementById('res-gold').textContent = this.gold;
                document.getElementById('res-prize').textContent = this.prizeCount;
                document.getElementById('res-boxes').textContent = this.openBoxes;
                document.getElementById('res-upgrade').textContent = this.upgradeTickets;
                document.getElementById('res-break').textContent = this.breakthroughTickets;
                document.getElementById('res-drug').textContent = this.drugG;
                document.getElementById('res-reforge').textContent = this.reforgeTickets;
            }

            showToast(message, type = 'info') {
                const toast = document.getElementById('toast');
                if (this._toastTimer) clearTimeout(this._toastTimer);
                toast.textContent = message;
                toast.className = `toast ${type}`;
                setTimeout(() => toast.classList.add('show'), 10);
                this._toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    this._toastTimer = null;
                }, 3000);
                // 成功/错误音效
                if (type === 'success') sfx.playSuccess();
                else if (type === 'error') sfx.playError();
            }

            showSection(section) {
                this.currentSection = section;
                this.battleInProgress = false;
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.section === section);
                });
                
                const main = document.getElementById('main-content');
                main.innerHTML = '';
                this.selectedHeroes = [];

                switch(section) {
                    case 'workshop': this.renderWorkshop(main); break;
                    case 'upgrade': this.renderUpgrade(main); break;
                    case 'battle': this.renderBattle(main); break;
                    case 'lottery': this.renderLottery(main); break;
                    case 'shop': this.renderShop(main); break;
                }
            }

            startGame() {
                // 初始化音效系统并启动背景音乐
                sfx.ensure();
                sfx.startBGM();

                this._migrateOldSave();
                if (this.hasSave()) {
                    const saves = this._getSaveList();
                    const latest = saves[0];
                    const time = latest && latest.data.savedAt ? new Date(latest.data.savedAt).toLocaleString() : '未知';
                    this.showModal(`
                        <h3 class="modal-title">✨ <span class="title-text">星穹弈境</span> ✨</h3>
                        <p class="text-center" style="color: var(--text-secondary); margin-bottom: 24px;">检测到已有存档 (${time})</p>
                        <div class="text-center flex flex-col gap-4" style="gap: 12px;">
                            <button class="btn btn-gold" onclick="game.loadSaveSlot(1); game.closeModal();" style="font-size: 18px; padding: 14px 40px;">📂 继续游戏</button>
                            <button class="btn btn-primary" onclick="game.closeModal(); game.showSection('workshop');" style="font-size: 16px; padding: 12px 32px;">🆕 新游戏（保留旧档）</button>
                            <button class="btn btn-danger" onclick="game.confirmNewGame()" style="font-size: 16px; padding: 12px 32px;">🗑️ 新游戏（删除旧档）</button>
                        </div>
                    `);
                } else {
                    this.showSection('workshop');
                }
            }

            confirmNewGame() {
                this.showModal(`
                    <h3 class="modal-title">⚠️ <span class="title-text">确认删除</span></h3>
                    <p class="text-center" style="color: var(--accent-red); margin-bottom: 24px;">此操作将永久删除当前存档，无法恢复！</p>
                    <div class="flex justify-center gap-4">
                        <button class="btn btn-danger" onclick="game.deleteSave(); game.closeModal(); game.showSection('workshop');">确认删除并开始</button>
                        <button class="btn btn-secondary" onclick="game.startGame()">返回</button>
                    </div>
                `);
            }

            // ==================== 工坊 ====================
            renderWorkshop(container) {
                container.innerHTML = `
                    <h2 class="section-title">⚒️ <span class="title-text">弈子工坊</span></h2>
                    <div class="text-center mb-4">
                        <button class="btn btn-primary" onclick="game.workshopForge()">🔨 锻造弈子</button>
                        <button class="btn btn-gold" onclick="game.workshopSynthesize()">🔀 融合弈子</button>
                        <button class="btn btn-secondary" onclick="game.workshopDisplay()">📋 陈列室</button>
                        <button class="btn btn-danger" onclick="game.workshopReforge()">🔥 回炉</button>
                        <button class="btn btn-success" onclick="game.workshopRename()">✏️ 改名</button>
                    </div>
                    <div id="workshop-content"></div>
                `;
            }

            getAllyHeroes() {
                return this.heroes.filter((h, i) => h && h.exist && h.isAlly);
            }

            getAllExistingHeroes() {
                return this.heroes.filter((h, i) => h && h.exist);
            }

            workshopForge() {
                const content = document.getElementById('workshop-content');
                content.innerHTML = `
                    <div class="text-center">
                        <p style="color: var(--text-secondary); margin-bottom: 16px;">金丹：${this.drugG}（锻造我方弈子时需要）</p>
                        <div class="flex justify-center gap-4">
                            <button class="btn btn-primary" onclick="game.doForge(true)" ${this.drugG <= 0 ? 'disabled style="opacity:0.5"' : ''}>锻造我方弈子</button>
                            <button class="btn btn-danger" onclick="game.doForge(false)">锻造敌方弈子</button>
                        </div>
                    </div>
                `;
            }

            generateRandomItem() {
                // 以A型机为标准的锻造数值上限
                const CAPS = {
                    baseAttack:       { min: 80,  max: 400  },
                    critRate:         { min: 0.10,max: 0.50 },  // 提高暴击率下限和上限
                    critMultiplier:   { min: 1.5, max: 5.0  },
                    recovery:         { min: 100, max: 1200 },
                    HP:               { min: 2000,max: 8000 },
                    ultimateMultiplier:{ min: 1.5, max: 5.0  },
                    skillCooldown:    { min: 1,   max: 5    },  // 缩小冷却范围，避免逆天数值
                    defenseFactor:    { min: 0,   max: 0.20 },
                    dodgeRate:        { min: 0,   max: 0.15 },
                };
                const rand = (cap) => cap.min + Math.random() * (cap.max - cap.min);
                const randInt = (cap) => Math.floor(rand(cap));

                return {
                    baseAttack:       randInt(CAPS.baseAttack),
                    critRate:         Math.round(rand(CAPS.critRate) * 100) / 100,
                    critMultiplier:   Math.round(rand(CAPS.critMultiplier) * 10) / 10,
                    recovery:         randInt(CAPS.recovery),
                    HP:               randInt(CAPS.HP),
                    dualAttack:       Math.random() < 0.5,
                    dualRecovery:     Math.random() < 0.5,
                    ultimateMultiplier: Math.round(rand(CAPS.ultimateMultiplier) * 10) / 10,
                    skillCooldown:    randInt(CAPS.skillCooldown),
                    defenseFactor:    Math.round(rand(CAPS.defenseFactor) * 100) / 100,
                    dodgeRate:        Math.round(rand(CAPS.dodgeRate) * 100) / 100
                };
            }

            doForge(isAlly) {
                if (isAlly && this.drugG <= 0) {
                    this.showToast("金丹不足！", "error");
                    return;
                }
                if (isAlly) this.drugG--;
                
                const sm = this.generateRandomItem();
                const idx = this.n++;
                const hero = this.createHero({
                    name: "", voiceLine: "", baseAttack: sm.baseAttack, level: 1,
                    recovery: sm.recovery, HP: sm.HP, dualAttack: sm.dualAttack,
                    dualRecovery: sm.dualRecovery, isAlly: isAlly,
                    ultimateMultiplier: sm.ultimateMultiplier, skillCooldown: sm.skillCooldown,
                    critMultiplier: sm.critMultiplier, critRate: sm.critRate,
                    baseScore: 1, defenseFactor: sm.defenseFactor, dodgeRate: sm.dodgeRate,
                    primaryProfession: 0, professionCounts: [0, 0, 0, 0], exist: true
                });
                
                // 确定主职业
                if (!hero.dualAttack && !hero.dualRecovery) hero.primaryProfession = 0;
                else if (hero.dualAttack && !hero.dualRecovery) hero.primaryProfession = 1;
                else if (!hero.dualAttack && hero.dualRecovery) hero.primaryProfession = 2;
                else hero.primaryProfession = 3;
                
                hero.professionName = professions[hero.primaryProfession];
                hero.professionCounts[hero.primaryProfession] = 1;
                
                this.showModal(`
                    <h3 class="modal-title">🔨 <span class="title-text">锻造新弈子</span></h3>
                    <div class="input-group">
                        <label>弈子名称</label>
                        <input type="text" id="forge-name" placeholder="输入名称">
                    </div>
                    <div class="input-group">
                        <label>弈子台词</label>
                        <input type="text" id="forge-voice" placeholder="输入台词">
                    </div>
                    <div class="text-center mt-4">
                        <button class="btn btn-primary" onclick="game.confirmForge(${idx}, ${isAlly})">确认锻造</button>
                    </div>
                `);
                this.pendingForge = { hero, idx };
                this.updateResourceBar();
            }

            confirmForge(idx, isAlly) {
                const name = document.getElementById('forge-name').value.trim();
                const voice = document.getElementById('forge-voice').value.trim();
                if (!name) {
                    this.showToast("请输入名称！", "error");
                    return;
                }
                this.pendingForge.hero.name = name;
                this.pendingForge.hero.voiceLine = voice;
                this.clampHeroStats(this.pendingForge.hero);
                this.heroes[idx] = this.pendingForge.hero;
                this.closeModal();
                this.showToast(`锻造成功！${name}已加入${isAlly ? '我方' : '敌方'}`, "success");
                this.autoSave();
                this.workshopForge();
            }

            workshopSynthesize() {
                const allies = this.getAllyHeroes();
                if (allies.length < 2) {
                    this.showToast("需要至少2个我方弈子才能融合！", "error");
                    return;
                }
                if (this.drugG <= 0) {
                    this.showToast("金丹不足！", "error");
                    return;
                }

                const content = document.getElementById('workshop-content');
                let html = `<div class="hero-grid">`;
                allies.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    html += this.createHeroCard(h, realIdx, `onclick="game.selectSynthHero(${realIdx})"`);
                });
                html += `</div><div class="text-center mt-4" id="synth-action"></div>`;
                content.innerHTML = html;
                this.synthSelected = [];
            }

            selectSynthHero(idx) {
                const card = document.querySelector(`[data-hero-idx="${idx}"]`);
                if (this.synthSelected.includes(idx)) {
                    this.synthSelected = this.synthSelected.filter(i => i !== idx);
                    card.classList.remove('selected');
                } else if (this.synthSelected.length < 2) {
                    this.synthSelected.push(idx);
                    card.classList.add('selected');
                }

                const action = document.getElementById('synth-action');
                if (this.synthSelected.length === 2) {
                    const h1 = this.heroes[this.synthSelected[0]];
                    const h2 = this.heroes[this.synthSelected[1]];
                    if (h1.level !== h2.level) {
                        action.innerHTML = `<p style="color: var(--accent-red);">合成仅限同等级的弈子！</p>`;
                    } else {
                        action.innerHTML = `
                            <button class="btn btn-gold" onclick="game.doSynthesize()">确认融合</button>
                            <button class="btn btn-secondary" onclick="game.workshopSynthesize()">重新选择</button>
                        `;
                    }
                } else {
                    action.innerHTML = `<p style="color: var(--text-secondary);">已选择 ${this.synthSelected.length}/2 个弈子</p>`;
                }
            }

            doSynthesize() {
                const [i1, i2] = this.synthSelected;
                const h1 = this.heroes[i1];
                const h2 = this.heroes[i2];
                this.drugG--;

                const content = document.getElementById('workshop-content');
                content.innerHTML = `
                    <h3 class="modal-title">🔀 <span class="title-text">融合弈子</span></h3>
                    <p class="text-center" style="color: var(--text-secondary);">选择主职业（将决定新弈子的主职业）</p>
                    <div class="flex justify-center gap-4 mt-4">
                        <button class="btn btn-primary" onclick="game.confirmSynth(${i1}, ${i2}, ${h1.primaryProfession})">
                            ${professions[h1.primaryProfession]}
                        </button>
                        <button class="btn btn-primary" onclick="game.confirmSynth(${i1}, ${i2}, ${h2.primaryProfession})">
                            ${professions[h2.primaryProfession]}
                        </button>
                    </div>
                `;
            }

            confirmSynth(i1, i2, primaryProf) {
                const h1 = this.heroes[i1];
                const h2 = this.heroes[i2];
                const secondaryProf = (h1.primaryProfession === h2.primaryProfession) ? null : (h1.primaryProfession + h2.primaryProfession - primaryProf);
                
                const idx = this.n++;
                const newHero = this.createHero({
                    name: "", voiceLine: "", baseAttack: Math.floor((h1.baseAttack + h2.baseAttack) / 2),
                    level: h1.level + 1, recovery: Math.floor((h1.recovery + h2.recovery) / 2),
                    HP: Math.floor((h1.HP + h2.HP) / 2),
                    dualAttack: (primaryProf % 2) === 1,
                    dualRecovery: (Math.floor(primaryProf / 2) % 2) === 1,
                    isAlly: true, ultimateMultiplier: (h1.ultimateMultiplier + h2.ultimateMultiplier) / 2,
                    skillCooldown: (h1.skillCooldown + h2.skillCooldown) / 2,
                    critMultiplier: (h1.critMultiplier + h2.critMultiplier) / 2,
                    critRate: (h1.critRate + h2.critRate) / 2,
                    baseScore: h1.baseScore + h2.baseScore,
                    defenseFactor: (h1.defenseFactor + h2.defenseFactor) / 2,
                    dodgeRate: (h1.dodgeRate + h2.dodgeRate) / 2,
                    primaryProfession: primaryProf,
                    professionCounts: [
                        h1.professionCounts[0] + h2.professionCounts[0],
                        h1.professionCounts[1] + h2.professionCounts[1],
                        h1.professionCounts[2] + h2.professionCounts[2],
                        h1.professionCounts[3] + h2.professionCounts[3]
                    ],
                    exist: true
                });
                newHero.secondaryProfession = secondaryProf;
                newHero.professionCounts[primaryProf]++;
                // 修正 maxHP：基于父母的最大HP而非当前HP
                newHero.maxHP = Math.floor((h1.maxHP + h2.maxHP) / 2);
                newHero.skillCooldown = Math.floor(newHero.skillCooldown);
                
                this.showModal(`
                    <h3 class="modal-title">🔀 <span class="title-text">合成新弈子</span></h3>
                    <div class="input-group">
                        <label>新弈子名称</label>
                        <input type="text" id="synth-name" placeholder="输入名称">
                    </div>
                    <div class="input-group">
                        <label>新弈子台词</label>
                        <input type="text" id="synth-voice" placeholder="输入台词">
                    </div>
                    <div class="text-center mt-4">
                        <button class="btn btn-gold" onclick="game.finalizeSynth(${i1}, ${i2}, ${idx})">确认合成</button>
                    </div>
                `);
                this.pendingSynth = { hero: newHero, idx };
                this.updateResourceBar();
            }

            finalizeSynth(i1, i2, idx) {
                const name = document.getElementById('synth-name').value.trim();
                const voice = document.getElementById('synth-voice').value.trim();
                if (!name) {
                    this.showToast("请输入名称！", "error");
                    return;
                }
                this.pendingSynth.hero.name = name;
                this.pendingSynth.hero.voiceLine = voice;
                this.clampHeroStats(this.pendingSynth.hero);
                this.heroes[idx] = this.pendingSynth.hero;
                this.heroes[i1].exist = false;
                this.heroes[i2].exist = false;
                this.closeModal();
                this.showToast(`融合成功！${name} 已诞生！`, "success");
                this.autoSave();
                this.showSection('workshop');
            }

            workshopDisplay() {
                const content = document.getElementById('workshop-content');
                const existing = this.getAllExistingHeroes();
                if (existing.length === 0) {
                    content.innerHTML = `<p class="text-center" style="color: var(--text-secondary);">暂无弈子</p>`;
                    return;
                }
                let html = `<div class="hero-grid">`;
                existing.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    html += this.createHeroCard(h, realIdx);
                });
                html += `</div>`;
                content.innerHTML = html;
            }

            createHeroCard(hero, idx, clickAttr = '', extraFooter = '') {
                const hpPercent = Math.max(0, Math.min(100, (hero.HP / (hero.maxHP || hero.HP)) * 100));
                const isAlly = hero.isAlly;
                return `
                    <div class="hero-card ${hero.isAlive ? '' : 'dead'}" data-hero-idx="${idx}" ${clickAttr}>
                        <div class="hero-header">
                            <div class="hero-name">${hero.name}</div>
                            <div class="hero-level">Lv.${hero.level}</div>
                        </div>
                        <div class="hero-profession">
                            <span style="color:var(--accent-blue);">主: ${hero.professionName}</span>
                            ${hero.secondaryProfession !== undefined && hero.secondaryProfession !== null && hero.secondaryProfession !== 0 ? `<span style="color:var(--accent-purple);"> / 副: ${secondaryProfessions[hero.primaryProfession][hero.secondaryProfession]}</span>` : ''}
                        </div>
                        <div class="hero-stats">
                            <div class="stat-item"><span class="stat-label">攻击</span><span class="stat-value">${Math.floor(hero.baseAttack)}</span></div>
                            <div class="stat-item"><span class="stat-label">生命</span><span class="stat-value">${Math.floor(hero.HP)}</span></div>
                            <div class="stat-item"><span class="stat-label">暴击率</span><span class="stat-value">${(hero.critRate * 100).toFixed(1)}%</span></div>
                            <div class="stat-item"><span class="stat-label">暴击倍率</span><span class="stat-value">${hero.critMultiplier.toFixed(2)}</span></div>
                            <div class="stat-item"><span class="stat-label">回复</span><span class="stat-value">${Math.floor(hero.recovery)}</span></div>
                            <div class="stat-item"><span class="stat-label">大招倍率</span><span class="stat-value" style="color:#ffd700;">×${hero.ultimateMultiplier.toFixed(1)}</span></div>
                            <div class="stat-item"><span class="stat-label">大招冷却</span><span class="stat-value">${hero.skillCooldown}回合</span></div>
                            <div class="stat-item"><span class="stat-label">范围技能</span><span class="stat-value" style="color:${hero.dualAttack ? '#ff6b81' : '#8892b0'};">${hero.dualAttack ? '✅ 全体' : '❌ 单体'}</span></div>
                            <div class="stat-item"><span class="stat-label">范围回血</span><span class="stat-value" style="color:${hero.dualRecovery ? '#7bed9f' : '#8892b0'};">${hero.dualRecovery ? '✅ 全体' : '❌ 单体'}</span></div>
                            <div class="stat-item"><span class="stat-label">防御</span><span class="stat-value">${(hero.defenseFactor * 100).toFixed(1)}%</span></div>
                            <div class="stat-item"><span class="stat-label">闪避</span><span class="stat-value">${(hero.dodgeRate * 100).toFixed(1)}%</span></div>
                        </div>
                        <div class="hp-bar">
                            <div class="hp-fill ${isAlly ? 'ally' : ''}" style="width: ${hpPercent}%"></div>
                        </div>
                        ${hero.voiceLine ? `<p style="margin-top:8px; font-size:12px; color:var(--text-secondary); font-style:italic;">"${hero.voiceLine}"</p>` : ''}
                        ${extraFooter}
                    </div>
                `;
            }

            workshopReforge() {
                const content = document.getElementById('workshop-content');
                const existing = this.getAllExistingHeroes();
                let html = `<div class="hero-grid">`;
                existing.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    const isInitial = realIdx <= 1;
                    const canReforge = !isInitial && (h.isAlly ? this.reforgeTickets > 0 : true);
                    let footer = '';
                    if (isInitial) footer = '<div style="margin-top:6px;font-size:11px;color:var(--accent-red);text-align:center;">🔒 初始弈子</div>';
                    else if (!h.isAlly) footer = '<div style="margin-top:6px;font-size:11px;color:var(--accent-green);text-align:center;">🆓 免费回炉</div>';
                    else if (this.reforgeTickets <= 0) footer = '<div style="margin-top:6px;font-size:11px;color:var(--accent-red);text-align:center;">需要回炉券</div>';
                    html += this.createHeroCard(h, realIdx, canReforge ? `onclick="game.doReforge(${realIdx})"` : '', footer);
                });
                html += `</div>`;
                if (this.reforgeTickets <= 0) {
                    html += `<p class="text-center mt-4" style="color:var(--text-secondary);font-size:13px;">💡 敌方弈子可免费回炉</p>`;
                }
                content.innerHTML = html;
            }

            doReforge(idx) {
                const hero = this.heroes[idx];
                
                // 初始英雄不可回炉
                if (idx <= 1) {
                    this.showToast("初始弈子不可回炉！", "error");
                    return;
                }
                
                // 高价值英雄二次确认
                if (hero.baseScore > 5) {
                    const refund = hero.isAlly ? hero.baseScore * 10 : 0;
                    this.showModal(`
                        <h3 class="modal-title">🔥 <span class="title-text">确认回炉</span></h3>
                        <p style="color: var(--accent-red); margin-bottom: 8px;">确定要回炉 <strong>${hero.name}</strong> 吗？</p>
                        <p style="color: var(--text-secondary); margin-bottom: 16px;">基准分: ${hero.baseScore} | ${hero.isAlly ? `返还 ${refund} 金币` : '免费回炉'}</p>
                        <div class="flex justify-center gap-4">
                            <button class="btn btn-danger" onclick="game._executeReforge(${idx})">确认回炉</button>
                            <button class="btn btn-secondary" onclick="game.closeModal()">取消</button>
                        </div>
                    `);
                    return;
                }
                
                this._executeReforge(idx);
            }

            _executeReforge(idx) {
                if (this.reforgeTickets <= 0 && this.heroes[idx].isAlly) return;
                const hero = this.heroes[idx];
                this.closeModal();
                
                // 敌方回炉免费，我方消耗回炉券
                if (hero.isAlly) {
                    this.reforgeTickets--;
                    let returned = 0;
                    for (let i = 0; i < this.cardIndex; i++) {
                        if (this.cards[i] && this.cards[i].useHero === idx) {
                            this.cards[i].isUsed = false;
                            this.cards[i].useHero = -1;
                            returned++;
                        }
                    }
                    if (returned > 0) this.showToast(`已返还 ${returned} 张卡牌`, "info");
                    this.gold += hero.baseScore * 10;
                    this.showToast(`已返还 ${hero.baseScore * 10} 金币`, "success");
                }
                
                hero.exist = false;
                hero.HP = 0;
                this.showToast(`${hero.name} 已回炉`, "info");
                this.updateResourceBar();
                this.workshopReforge();
            }

            workshopRename() {
                if (this.reforgeTickets <= 0) {
                    this.showToast("回炉券不足！", "error");
                    return;
                }
                const content = document.getElementById('workshop-content');
                const existing = this.getAllExistingHeroes();
                let html = `<div class="hero-grid">`;
                existing.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    html += this.createHeroCard(h, realIdx, `onclick="game.doRename(${realIdx})"`);
                });
                html += `</div>`;
                content.innerHTML = html;
            }

            doRename(idx) {
                const hero = this.heroes[idx];
                this.showModal(`
                    <h3 class="modal-title">✏️ <span class="title-text">改名</span></h3>
                    <div class="input-group">
                        <label>新名称</label>
                        <input type="text" id="rename-name" value="${hero.name}">
                    </div>
                    <div class="input-group">
                        <label>新台词</label>
                        <input type="text" id="rename-voice" value="${hero.voiceLine}">
                    </div>
                    <div class="text-center mt-4">
                        <button class="btn btn-success" onclick="game.confirmRename(${idx})">确认修改</button>
                    </div>
                `);
            }

            confirmRename(idx) {
                const name = document.getElementById('rename-name').value.trim();
                if (!name) {
                    this.showToast("名称不能为空！", "error");
                    return;
                }
                this.reforgeTickets--;
                this.heroes[idx].name = name;
                this.heroes[idx].voiceLine = document.getElementById('rename-voice').value.trim();
                this.closeModal();
                this.showToast("改名成功！", "success");
                this.updateResourceBar();
                this.workshopRename();
            }

            // ==================== 升级 ====================
            renderUpgrade(container) {
                container.innerHTML = `
                    <h2 class="section-title">⬆️ <span class="title-text">弈子养成</span></h2>
                    <div class="text-center mb-4">
                        <button class="btn btn-primary" onclick="game.upgradeNormal()">📈 普通升级</button>
                        <button class="btn btn-gold" onclick="game.upgradeEnchant()">✨ 附魔</button>
                        <button class="btn btn-danger" onclick="game.upgradeBreakthrough()">⚡ 突破</button>
                    </div>
                    <div id="upgrade-content"></div>
                `;
            }

            upgradeNormal() {
                const allies = this.getAllyHeroes();
                const content = document.getElementById('upgrade-content');
                const useTicket = this._useUpgradeTicket || false;
                const switchHtml = `
                    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;">
                        <span style="color:var(--text-secondary);font-size:14px;">点击弈子升级模式：</span>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 14px;background:${useTicket ? 'rgba(184,41,221,0.15)' : 'rgba(255,215,0,0.1)'};border-radius:20px;border:1px solid ${useTicket ? 'rgba(184,41,221,0.4)' : 'rgba(255,215,0,0.3)'};transition:all 0.3s;">
                            <span style="font-size:13px;color:${useTicket ? 'var(--text-secondary)' : 'var(--accent-gold)'};font-weight:${useTicket ? 'normal' : 'bold'};">💰 普通</span>
                            <div onclick="game.toggleUpgradeMode()" style="width:44px;height:24px;background:${useTicket ? 'var(--accent-purple)' : 'rgba(255,255,255,0.15)'};border-radius:12px;position:relative;cursor:pointer;transition:background 0.3s;">
                                <div style="width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;${useTicket ? 'right:2px;' : 'left:2px;'}transition:all 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>
                            </div>
                            <span style="font-size:13px;color:${useTicket ? 'var(--accent-purple)' : 'var(--text-secondary)'};font-weight:${useTicket ? 'bold' : 'normal'};">✨ 职业+券</span>
                        </label>
                        ${this.upgradeTickets > 0 ? `<span style="font-size:12px;color:var(--accent-purple);">📜 余${this.upgradeTickets}</span>` : '<span style="font-size:12px;color:var(--text-muted);">📜 无券</span>'}
                    </div>
                `;
                let html = `${switchHtml}<div class="hero-grid">`;
                allies.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    const costA = Math.floor(5 * Math.pow(1.03, h.baseScore));
                    const costB = Math.floor(8 * Math.pow(1.02, h.baseScore));
                    const caps = this.getStatCaps(h.level || 1);
                    const isAtCap = h.baseAttack >= caps.baseAttack && h.HP >= caps.HP && h.maxHP >= caps.maxHP;
                    const capWarning = isAtCap ? `<div style="margin-top:6px;font-size:11px;color:var(--accent-red);text-align:center;">⚠️ 属性已达上限</div>` : '';
                    const modeInfo = useTicket
                        ? `<span style="font-size:11px;color:var(--accent-purple);padding:4px 8px;background:rgba(184,41,221,0.1);border-radius:6px;">✨${costB}+📜</span>`
                        : `<span style="font-size:11px;color:var(--accent-gold);padding:4px 8px;background:rgba(255,215,0,0.1);border-radius:6px;">💰${costA}</span>`;
                    html += this.createHeroCard(h, realIdx, `onclick="game.doUpgrade(${realIdx})"`, `
                        <div style="margin-top:8px;display:flex;gap:6px;justify-content:center;">
                            ${modeInfo}
                        </div>
                        ${capWarning}
                    `);
                });
                html += `</div>`;
                content.innerHTML = html;
            }

            toggleUpgradeMode() {
                this._useUpgradeTicket = !this._useUpgradeTicket;
                this.upgradeNormal();
            }

            doUpgrade(idx) {
                const hero = this.heroes[idx];
                const caps = this.getStatCaps(hero.level || 1);
                const isAtCap = hero.baseAttack >= caps.baseAttack && hero.HP >= caps.HP && hero.maxHP >= caps.maxHP;
                if (isAtCap) {
                    this.showToast(`${hero.name} 属性已达当前等级上限！需要融合提升等级。`, "error");
                    return;
                }
                // 根据开关状态直接路由到对应升级方式
                if (this._useUpgradeTicket && this.upgradeTickets > 0) {
                    this.upgradeTypeB(idx);
                } else {
                    if (this._useUpgradeTicket && this.upgradeTickets <= 0) {
                        this.showToast("升级券不足，已切换为普通升级", "info");
                    }
                    this.upgradeTypeA(idx);
                }
            }

            upgradeTypeA(idx) {
                const hero = this.heroes[idx];
                const caps = this.getStatCaps(hero.level || 1);
                const isAtCap = hero.baseAttack >= caps.baseAttack && hero.HP >= caps.HP && hero.maxHP >= caps.maxHP;
                if (isAtCap) {
                    this.showToast(`${hero.name} 属性已达当前等级上限！`, "error");
                    this.closeModal();
                    this.upgradeNormal();
                    return;
                }
                const cost = Math.floor(5 * Math.pow(1.03, hero.baseScore));
                if (this.gold < cost) {
                    this.showToast("金币不足！", "error");
                    return;
                }
                this.gold -= cost;
                hero.baseScore++;
                
                if (hero.baseScore % 2 === 0) {
                    hero.maxHP = Math.floor(hero.maxHP * 1.1);
                    hero.HP = Math.floor(hero.HP * 1.1);
                } else {
                    hero.baseAttack = Math.floor(hero.baseAttack * 1.1);
                }
                this.clampHeroStats(hero);
                // 检查是否撞上限
                const newCaps = this.getStatCaps(hero.level || 1);
                if (hero.baseAttack >= newCaps.baseAttack || hero.HP >= newCaps.HP) {
                    this.showToast(`升级成功！⚠️ 部分属性已达上限，需融合提升等级才能继续。`, "info");
                } else {
                    this.showToast(`升级成功！ATK: ${Math.floor(hero.baseAttack)} | HP: ${Math.floor(hero.HP)}`, "success");
                }
                this.updateResourceBar();
                this.closeModal();
                this.upgradeNormal();
            }

            upgradeTypeB(idx) {
                const hero = this.heroes[idx];
                const caps = this.getStatCaps(hero.level || 1);
                const isAtCap = hero.baseAttack >= caps.baseAttack && hero.HP >= caps.HP && hero.maxHP >= caps.maxHP;
                if (isAtCap) {
                    this.showToast(`${hero.name} 属性已达当前等级上限！`, "error");
                    this.closeModal();
                    this.upgradeNormal();
                    return;
                }
                const cost = Math.floor(8 * Math.pow(1.02, hero.baseScore));
                if (this.gold < cost || this.upgradeTickets < 1) {
                    this.showToast("资源不足！", "error");
                    return;
                }
                this.gold -= cost;
                this.upgradeTickets--;
                hero.baseScore++;

                switch(hero.primaryProfession) {
                    case 0: hero.critMultiplier *= 1.1; break;
                    case 1: hero.ultimateMultiplier *= 1.1; break;
                    case 2: hero.recovery *= 1.1; break;
                    case 3: hero.defenseFactor = Math.min(0.99, hero.defenseFactor * 1.1); break;
                }
                
                if (hero.level > 1) {
                    if (hero.primaryProfession !== 0) hero.critMultiplier *= 1 + hero.professionCounts[0] * 0.05;
                    if (hero.primaryProfession !== 1) hero.ultimateMultiplier *= 1 + hero.professionCounts[1] * 0.05;
                    if (hero.primaryProfession !== 2) hero.recovery *= 1 + hero.professionCounts[2] * 0.05;
                    if (hero.primaryProfession !== 3) hero.defenseFactor = Math.min(0.99, hero.defenseFactor * (1 + hero.professionCounts[3] * 0.05));
                }
                
                this.clampHeroStats(hero);
                this.showToast("职业属性升级成功！", "success");
                this.updateResourceBar();
                this.closeModal();
                this.upgradeNormal();
            }

            upgradeEnchant() {
                const content = document.getElementById('upgrade-content');
                const unusedCards = this.cards.filter((c, i) => i < this.cardIndex && !c.isUsed);
                
                let html = `
                    <h3 style="color: var(--accent-purple); margin-bottom: 16px;">✨ 卡册（未使用）- 可多选</h3>
                    <div style="max-height: 300px; overflow-y: auto;">
                `;
                if (unusedCards.length === 0) {
                    html += `<p style="color: var(--text-secondary);">暂无可用卡牌</p>`;
                } else {
                    unusedCards.forEach((c, i) => {
                        const realIdx = this.cards.indexOf(c);
                        html += `
                            <div class="card-item" data-card-idx="${realIdx}" onclick="game.selectEnchantCard(${realIdx})">
                                <span>卡牌${c.cardID} - ${types[c.type]} ${operations[c.operation]}${c.value.toFixed(2)}</span>
                                <span style="color: var(--accent-gold);">选择</span>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                html += `<div id="enchant-selected-info" style="margin-top:8px;font-size:13px;color:var(--text-secondary);text-align:center;">已选 0 张卡牌</div>`;
                
                const allies = this.getAllyHeroes();
                html += `<h3 style="color: var(--accent-blue); margin: 16px 0;">🎯 选择目标弈子</h3><div class="hero-grid">`;
                allies.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    html += this.createHeroCard(h, realIdx, `onclick="game.selectEnchantTarget(${realIdx})"`);
                });
                html += `</div>`;
                
                content.innerHTML = html;
                this.enchantCards = [];
                this.enchantTarget = -1;
            }

            selectEnchantCard(idx) {
                const cardEl = document.querySelector(`#upgrade-content .card-item[data-card-idx="${idx}"]`);
                if (!cardEl) return;
                if (this.enchantCards.includes(idx)) {
                    this.enchantCards = this.enchantCards.filter(i => i !== idx);
                    cardEl.style.borderColor = 'rgba(184, 41, 221, 0.4)';
                    cardEl.style.boxShadow = '';
                } else {
                    this.enchantCards.push(idx);
                    cardEl.style.borderColor = 'var(--accent-gold)';
                    cardEl.style.boxShadow = '0 0 12px rgba(255,215,0,0.4)';
                }
                const info = document.getElementById('enchant-selected-info');
                if (info) info.textContent = `已选 ${this.enchantCards.length} 张卡牌`;
                this.checkEnchant();
            }

            selectEnchantTarget(idx) {
                this.enchantTarget = idx;
                document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
                document.querySelector(`[data-hero-idx="${idx}"]`).classList.add('selected');
                this.checkEnchant();
            }

            checkEnchant() {
                if (this.enchantCards.length > 0 && this.enchantTarget !== -1) {
                    const hero = this.heroes[this.enchantTarget];
                    const totalCost = Math.floor(2 * Math.pow(1.03, hero.baseScore)) * this.enchantCards.length;
                    if (this.gold < totalCost) {
                        this.showToast(`金币不足！需要 ${totalCost} 金币`, "error");
                        return;
                    }
                    this.gold -= totalCost;
                    hero.baseScore += this.enchantCards.length;
                    
                    const appliedNames = [];
                    this.enchantCards.forEach(cardIdx => {
                        const card = this.cards[cardIdx];
                        card.useHero = this.enchantTarget;
                        this.applyCardToHero(card, hero);
                        appliedNames.push(`${types[card.type]}${operations[card.operation]}${card.value.toFixed(2)}`);
                    });
                    
                    this.showToast(`${hero.name} 被附魔 ${this.enchantCards.length} 张卡牌！`, "success");
                    this.clampHeroStats(hero);
                    this.updateResourceBar();
                    this.upgradeEnchant();
                }
            }

            applyCardToHero(card, hero) {
                card.isUsed = true;
                const val = card.value;
                const op = card.operation;
                
                const apply = (prop, minVal, maxVal, isFloat = true) => {
                    let v = hero[prop];
                    if (op === 0) v += val;
                    else if (op === 1) v -= val;
                    else if (op === 2) v *= val;
                    else if (op === 3) v /= val;
                    
                    if (minVal !== null) v = Math.max(minVal, v);
                    if (maxVal !== null) v = Math.min(maxVal, v);
                    hero[prop] = isFloat ? v : Math.floor(v);
                };

                switch(card.type) {
                    case 0: apply('baseAttack', 0, null, false); break;
                    case 1: apply('critRate', 0, 0.99); break;
                    case 2: apply('critMultiplier', 1.0, null); break;
                    case 3: apply('recovery', 0, null, false); break;
                    case 4: apply('HP', 1, null, false); break;
                    case 5: apply('ultimateMultiplier', 1.0, null); break;
                    case 6: // 大招冷却：+实际减少冷却，×实际降低冷却倍率
                        {
                            let v = hero.skillCooldown;
                            if (op === 0) v -= val;       // 加法卡 → 减冷却
                            else if (op === 2) v /= val;   // 乘法卡 → 除冷却
                            v = Math.max(1, v);
                            hero.skillCooldown = Math.floor(v);
                        }
                        break;
                    case 7: apply('defenseFactor', 0, 0.99); break;
                    case 8: apply('dodgeRate', 0, 0.99); break;
                    case 9: apply('ultimateMultiplier', 1.0, null); break;
                }
            }

            upgradeBreakthrough() {
                if (this.breakthroughTickets <= 0) {
                    this.showToast("突破券不足！", "error");
                    return;
                }
                const allies = this.getAllyHeroes();
                const content = document.getElementById('upgrade-content');
                let html = `<p style="color:var(--text-secondary);margin-bottom:12px;text-align:center;">点击弈子进行突破（消耗：1突破券 + 金币）</p><div class="hero-grid">`;
                allies.forEach((h, i) => {
                    const realIdx = this.heroes.indexOf(h);
                    const cost = Math.floor(5 * Math.pow(1.05, h.baseScore));
                    const canAfford = this.gold >= cost;
                    html += this.createHeroCard(h, realIdx, `onclick="game.doBreakthrough(${realIdx})"`, `
                        <div style="margin-top:6px;text-align:center;">
                            <span style="font-size:11px;color:${canAfford ? 'var(--accent-gold)' : 'var(--accent-red)'};padding:4px 8px;background:rgba(255,215,0,0.1);border-radius:6px;">💰${cost} + 📜1</span>
                        </div>
                    `);
                });
                html += `</div>`;
                content.innerHTML = html;
            }

            doBreakthrough(idx) {
                const hero = this.heroes[idx];
                if (!hero || !hero.exist) { this.showToast("弈子不存在！", "error"); return; }
                if (this.breakthroughTickets <= 0) { this.showToast("突破券不足！", "error"); return; }
                const cost = Math.floor(5 * Math.pow(1.05, hero.baseScore));
                if (this.gold < cost) { this.showToast(`金币不足！需要 ${cost} 金币`, "error"); return; }

                if (!hero.attributes.isAttributeLocked) {
                    this.showModal(`
                        <h3 class="modal-title">⚡ <span class="title-text">突破属性选择</span></h3>
                        <p style="color:var(--text-secondary);text-align:center;margin-bottom:12px;">消耗: 💰${cost} + 📜1 | 当前券: ${this.breakthroughTickets}</p>
                        <div style="display: grid; gap: 8px;">
                            ${attributes.map((attr, i) => `
                                <button class="btn btn-secondary" onclick="game.confirmBreakthrough(${idx}, ${i})" style="text-align: left;">
                                    ${i}. ${attr}
                                </button>
                            `).join('')}
                        </div>
                        <button class="btn btn-danger" onclick="game.closeModal()" style="margin-top:12px;width:100%;">❌ 取消</button>
                    `);
                } else {
                    // 扣除资源
                    this.gold -= cost;
                    this.breakthroughTickets--;
                    hero.baseScore++;
                    this.applyBreakthrough(hero);
                    this.showToast(`${hero.name} ${hero.attributes.name} ×${hero.lastBreakRate.toFixed(2)}`, "success");
                    this.updateResourceBar();
                    this.upgradeBreakthrough();
                }
            }

            confirmBreakthrough(idx, attrIdx) {
                const hero = this.heroes[idx];
                const cost = Math.floor(5 * Math.pow(1.05, hero.baseScore));
                // 确认后才扣除资源
                if (this.gold < cost || this.breakthroughTickets < 1) {
                    this.showToast("资源不足！", "error");
                    this.closeModal();
                    return;
                }
                this.gold -= cost;
                this.breakthroughTickets--;
                hero.baseScore++;
                hero.attributes.isAttributeLocked = true;
                hero.attributes.operation = attrIdx;
                this.closeModal();
                this.applyBreakthrough(hero);
                this.showToast(`${hero.name} ${hero.attributes.name} ×${hero.lastBreakRate.toFixed(2)}`, "success");
                this.updateResourceBar();
                this.upgradeBreakthrough();
            }

            applyBreakthrough(hero) {
                const rate = 1.0 + (Math.random() * 0.5);
                hero.lastBreakRate = rate;
                hero.attributes.name = attributes[hero.attributes.operation];
                const op = hero.attributes.operation;
                
                if (op === 0) hero.baseAttack *= rate;
                else if (op === 1) hero.critMultiplier *= rate;
                else if (op === 2) hero.recovery *= rate;
                else if (op === 3) { hero.maxHP = Math.floor(hero.maxHP * rate); hero.HP = Math.floor(hero.HP * rate); }
                else if (op === 4) hero.ultimateMultiplier *= rate;
                else if (op === 5) hero.skillCooldown = Math.max(1, Math.floor(hero.skillCooldown / rate));
                else if (op === 6) hero.defenseFactor = Math.min(0.99, hero.defenseFactor * rate);
                else if (op === 7) hero.dodgeRate = Math.min(0.99, hero.dodgeRate * rate);
                this.clampHeroStats(hero);
            }

            // ==================== 战斗音效 ====================
            playBattleSound(type) {
                const map = {
                    'attack': () => sfx.playBattleAttack(),
                    'crit': () => sfx.playBattleCrit(),
                    'heal': () => sfx.playBattleHeal(),
                    'dodge': () => sfx.playBattleDodge(),
                    'ultimate': () => sfx.playBattleUltimate(),
                    'kill': () => sfx.playBattleKill(),
                    'victory': () => sfx.playBattleVictory(),
                    'defeat': () => sfx.playBattleDefeat(),
                };
                if (map[type]) map[type]();
            }

            toggleVolumePanel() {
                const vc = document.querySelector('.volume-control');
                if (vc) vc.classList.toggle('show');
            }

            toggleMute() {
                sfx.ensure();
                const muted = sfx.toggleMute();
                const btn = document.getElementById('btn-mute');
                if (btn) {
                    btn.textContent = muted ? '🔇' : '🔈';
                    btn.classList.toggle('muted', muted);
                }
            }

            // ==================== 战斗 ====================
            renderBattle(container) {
                const savedDifficulty = localStorage.getItem('starChess_difficulty') || '1.0';
                const savedSpeed = parseInt(localStorage.getItem('starChess_battleSpeed')) || 2;
                this.battleSpeed = savedSpeed;
                container.innerHTML = `
                    <h2 class="section-title">⚔️ <span class="title-text">星穹战场</span></h2>
                    <div class="battle-controls" id="battle-controls">
                        <div class="text-center mb-4">
                            <div class="input-group" style="max-width: 300px; margin: 0 auto;">
                                <label>战斗难度（1.0 - 227.0）</label>
                                <input type="number" id="battle-difficulty" value="${savedDifficulty}" step="0.1" min="0.1" max="227">
                            </div>
                            <div style="margin: 12px 0; display: flex; justify-content: center; gap: 8px;">
                                <button class="btn btn-secondary battle-speed" data-speed="1" onclick="game.setBattleSpeed(1)" style="padding: 8px 16px; font-size: 13px;">🐢 慢速</button>
                                <button class="btn btn-primary battle-speed active" data-speed="2" onclick="game.setBattleSpeed(2)" style="padding: 8px 16px; font-size: 13px;">⚡ 正常</button>
                                <button class="btn btn-gold battle-speed" data-speed="4" onclick="game.setBattleSpeed(4)" style="padding: 8px 16px; font-size: 13px;">🚀 快速</button>
                            </div>
                            <button class="btn btn-danger mt-4" onclick="game.startBattle()" style="font-size: 18px; padding: 14px 40px;">开始战斗</button>
                        </div>
                    </div>
                    <div id="battle-content"></div>
                `;
                this.setBattleSpeed(savedSpeed);
            }

            setBattleSpeed(speed) {
                this.battleSpeed = speed;
                localStorage.setItem('starChess_battleSpeed', speed);
                document.querySelectorAll('.battle-speed').forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.speed) === speed);
                    btn.classList.toggle('btn-primary', parseInt(btn.dataset.speed) === speed);
                    btn.classList.toggle('btn-secondary', parseInt(btn.dataset.speed) !== speed && parseInt(btn.dataset.speed) === 1);
                    btn.classList.toggle('btn-gold', parseInt(btn.dataset.speed) !== speed && parseInt(btn.dataset.speed) === 4);
                });
            }

            startBattle() {
                let difficulty = parseFloat(document.getElementById('battle-difficulty').value);
                if (isNaN(difficulty) || difficulty <= 0 || difficulty > 227) {
                    this.showToast("难度已调整至默认值 1.0", "info");
                    difficulty = 1.0;
                }
                localStorage.setItem('starChess_difficulty', difficulty.toString());
                difficulty = difficulty * difficulty;
                
                const allies = this.heroes.filter(h => h && h.exist && h.isAlly);
                const enemies = this.heroes.filter(h => h && h.exist && !h.isAlly);
                
                if (allies.length === 0 || enemies.length === 0) {
                    this.showToast("战斗双方都需要至少1个弈子！", "error");
                    return;
                }

                // 隐藏战斗控制面板
                const controls = document.getElementById('battle-controls');
                if (controls) controls.classList.add('hidden');

                // 切换到战斗 BGM
                if (!sfx.muted) sfx.startBattleBGM();

                // 复制英雄用于战斗
                const battleHeroes = this.heroes.map((h, i) => {
                    if (!h || !h.exist) return null;
                    const bh = JSON.parse(JSON.stringify(h));
                    bh.originalIndex = i;
                    bh.skillCD = h.skillCooldown;
                    if (!bh.isAlly) {
                        bh.HP = Math.floor(bh.HP * difficulty);
                        bh.maxHP = bh.HP;
                        bh.baseAttack = Math.floor(bh.baseAttack * difficulty);
                    }
                    bh.hasSkill = false;
                    bh.isAlive = true;
                    return bh;
                }).filter(h => h !== null);

                this.battleState = {
                    heroes: battleHeroes,
                    difficulty: difficulty,
                    round: 1,
                    log: [],
                    actionOrder: battleHeroes.map((h, i) => i),
                    difficultySquared: difficulty
                };

                // 直接使用上次布阵（如果有），否则使用默认顺序
                const savedFormation = localStorage.getItem('starChess_formation');
                if (savedFormation) {
                    try {
                        const saved = JSON.parse(savedFormation);
                        const allyIndices = battleHeroes.filter(h => h.isAlly).map(h => h.originalIndex);
                        const validSaved = saved.filter(idx => allyIndices.includes(idx));
                        // 补充未选中的
                        allyIndices.forEach(idx => {
                            if (!validSaved.includes(idx)) validSaved.push(idx);
                        });
                        this.formationSelected = validSaved;
                        this.confirmFormation();
                    } catch {
                        this.skipFormation();
                    }
                } else {
                    this.skipFormation();
                }
            }

            selectFormation(originalIdx) {
                if (this.formationSelected.includes(originalIdx)) return;
                this.formationSelected.push(originalIdx);
                const btn = document.getElementById(`form-${originalIdx}`);
                btn.classList.add('formation-selected');
                btn.textContent += ` [第${this.formationSelected.length}位]`;
            }

            skipFormation() {
                this.closeModal();
                this.runBattleLoop();
            }

            confirmFormation() {
                const allies = this.battleState.heroes.filter(h => h.isAlly);
                const enemies = this.battleState.heroes.filter(h => !h.isAlly);
                
                const newOrder = [];
                this.formationSelected.forEach(idx => {
                    const found = this.battleState.heroes.find(h => h.originalIndex === idx);
                    if (found) newOrder.push(this.battleState.heroes.indexOf(found));
                });
                enemies.forEach((h, i) => {
                    const idx = this.battleState.heroes.indexOf(h);
                    if (!newOrder.includes(idx)) newOrder.push(idx);
                });
                allies.forEach((h, i) => {
                    const idx = this.battleState.heroes.indexOf(h);
                    if (!newOrder.includes(idx)) newOrder.push(idx);
                });
                
                // 保存布阵记忆
                localStorage.setItem('starChess_formation', JSON.stringify(this.formationSelected));
                this.battleState.actionOrder = newOrder;
                this.closeModal();
                this.runBattleLoop();
            }

            loadSavedFormation() {
                try {
                    const saved = JSON.parse(localStorage.getItem('starChess_formation') || '[]');
                    const allies = this.battleState.heroes.filter(h => h.isAlly);
                    const allyIndices = allies.map(h => h.originalIndex);
                    // 只选存在的英雄
                    this.formationSelected = saved.filter(idx => allyIndices.includes(idx));
                    // 补充未选中的
                    allyIndices.forEach(idx => {
                        if (!this.formationSelected.includes(idx)) this.formationSelected.push(idx);
                    });
                    // 更新按钮显示
                    this.formationSelected.forEach((idx, i) => {
                        const btn = document.getElementById(`form-${idx}`);
                        if (btn) {
                            btn.classList.add('formation-selected');
                            btn.textContent += ` [第${i + 1}位]`;
                        }
                    });
                    this.confirmFormation();
                } catch { this.skipFormation(); }
            }

            async runBattleLoop() {
                const content = document.getElementById('battle-content');
                this.battleInProgress = true;
                
                while (this.battleInProgress) {
                    const state = this.battleState;
                    
                    // 检查战斗结束
                    const allEnemiesDead = state.heroes.filter(h => !h.isAlly).every(h => !h.isAlive);
                    const allAlliesDead = state.heroes.filter(h => h.isAlly).every(h => !h.isAlive);
                    
                    if (allAlliesDead || allEnemiesDead || state.round > 100) {
                        await this.endBattle(!allAlliesDead && state.round <= 100);
                        break;
                    }

                    // 渲染战场
                    this.renderBattleField(content);
                    await this.sleep(800 / this.battleSpeed);

                    // 玩家方行动
                    for (const idx of state.actionOrder) {
                        const hero = state.heroes[idx];
                        if (!hero || !hero.isAlly || !hero.isAlive) continue;
                        
                        // 大招检查：冷却归零则触发
                        if (hero.skillCooldown <= 0 && hero.ultimateMultiplier > 1) {
                            hero.hasSkill = true;
                        }
                        
                        // 治疗
                        if (!hero.dualRecovery) {
                            hero.HP += hero.recovery;
                            if (hero.HP > hero.maxHP) hero.HP = hero.maxHP;
                            if (hero.recovery > 0) {
                                this.addBattleLog(`（我方）${hero.name} 治疗 +${Math.floor(hero.recovery)}`, 'heal');
                                this.showDamageNumber(idx, Math.floor(hero.recovery), true);
                                this.playBattleSound('heal');
                            }
                        } else {
                            state.heroes.forEach(ally => {
                                if (ally.isAlive && ally.isAlly) {
                                    ally.HP += hero.recovery;
                                    if (ally.HP > ally.maxHP) ally.HP = ally.maxHP;
                                }
                            });
                            if (hero.recovery > 0) {
                                this.addBattleLog(`（我方）全队治疗 +${Math.floor(hero.recovery)}`, 'heal');
                            }
                        }
                        
                        await this.sleep(300 / this.battleSpeed);
                        
                        // 选择目标（基于布阵顺序：优先攻击行动顺序靠前的敌人）
                        const targets = state.heroes.filter(h => !h.isAlly && h.isAlive);
                        if (targets.length === 0) continue;
                        let target;
                        // 70%概率攻击布阵顺序靠前的，30%概率随机
                        if (Math.random() < 0.7) {
                            // 按行动顺序找第一个存活的敌方
                            for (const oi of state.actionOrder) {
                                const oh = state.heroes[oi];
                                if (oh && !oh.isAlly && oh.isAlive) { target = oh; break; }
                            }
                        }
                        if (!target) {
                            target = targets[Math.floor(Math.random() * targets.length)];
                        }
                        
                        // 攻击
                        if (hero.dualAttack) {
                            state.heroes.filter(h => !h.isAlly && h.isAlive).forEach(enemy => {
                                this.attackHero(hero, enemy, state);
                            });
                        } else {
                            this.attackHero(hero, target, state);
                        }
                        
                        // 更新存活
                        state.heroes.forEach(h => {
                            h.isAlive = h.HP > 0;
                        });
                        
                        // 大招使用后重置
                        if (hero.hasSkill) {
                            hero.skillCooldown = hero.skillCD;
                        }
                        hero.hasSkill = false;
                        
                        await this.sleep(600 / this.battleSpeed);
                        this.renderBattleField(content);
                    }

                    // 敌方行动
                    for (const idx of state.actionOrder) {
                        const hero = state.heroes[idx];
                        if (!hero || hero.isAlly || !hero.isAlive) continue;
                        
                        // 大招检查：冷却归零则触发
                        if (hero.skillCooldown <= 0 && hero.ultimateMultiplier > 1) {
                            hero.hasSkill = true;
                        }
                        
                        // 治疗
                        if (!hero.dualRecovery) {
                            hero.HP += hero.recovery;
                            if (hero.HP > hero.maxHP) hero.HP = hero.maxHP;
                            if (hero.recovery > 0) {
                                this.addBattleLog(`（敌方）${hero.name} 治疗 +${Math.floor(hero.recovery)}`, 'heal');
                            }
                        } else {
                            state.heroes.filter(h => h.isAlive && !h.isAlly).forEach(enemy => {
                                enemy.HP += hero.recovery;
                                if (enemy.HP > enemy.maxHP) enemy.HP = enemy.maxHP;
                            });
                            if (hero.recovery > 0) {
                                this.addBattleLog(`（敌方）全队治疗 +${Math.floor(hero.recovery)}`, 'heal');
                            }
                        }
                        
                        await this.sleep(300 / this.battleSpeed);
                        
                        // 选择目标（基于布阵顺序：优先攻击行动顺序靠前的我方）
                        const targets = state.heroes.filter(h => h.isAlly && h.isAlive);
                        if (targets.length === 0) continue;
                        let target;
                        if (Math.random() < 0.7) {
                            for (const oi of state.actionOrder) {
                                const oh = state.heroes[oi];
                                if (oh && oh.isAlly && oh.isAlive) { target = oh; break; }
                            }
                        }
                        if (!target) {
                            target = targets[Math.floor(Math.random() * targets.length)];
                        }
                        
                        // 攻击
                        if (hero.dualAttack) {
                            state.heroes.filter(h => h.isAlly && h.isAlive).forEach(ally => {
                                this.attackHero(hero, ally, state);
                            });
                        } else {
                            this.attackHero(hero, target, state);
                        }
                        
                        state.heroes.forEach(h => {
                            h.isAlive = h.HP > 0;
                        });
                        
                        // 大招使用后重置
                        if (hero.hasSkill) {
                            hero.skillCooldown = hero.skillCD;
                        }
                        hero.hasSkill = false;
                        
                        await this.sleep(600 / this.battleSpeed);
                        this.renderBattleField(content);
                    }

                    // 冷却
                    state.heroes.forEach(h => {
                        if (h.skillCooldown > 0) h.skillCooldown--;
                    });
                    
                    state.round++;
                    await this.sleep(600 / this.battleSpeed);
                }
            }

            attackHero(attacker, defender, state) {
                let comboCount = 0;
                let totalDamage = 0;
                let continueCombo = true;
                const damage = attacker.baseAttack;
                const comboHitDamages = []; // 记录每次连击的伤害

                while (continueCombo) {
                    continueCombo = false;
                    
                    if ((Math.random() * 100) < (attacker.critRate * 100)) {
                        const multiplierVariation = 1.0 + (Math.random() * 0.5);
                        const critDamage = multiplierVariation * attacker.critMultiplier * damage;
                        totalDamage += critDamage;
                        
                        if (multiplierVariation > 1.2) {
                            comboHitDamages.push(Math.floor(critDamage));
                            this.addBattleLog(`超级暴击！△${Math.floor(critDamage)} 连击×${comboCount + 1}`, 'crit');
                            comboCount++;
                            continueCombo = true;
                            continue;
                        } else if (multiplierVariation > 1.1) {
                            this.addBattleLog(`强力暴击! △${Math.floor(critDamage)}`, 'crit');
                        } else {
                            this.addBattleLog(`暴击! △${Math.floor(critDamage)}`, 'crit');
                        }
                    } else {
                        totalDamage += damage;
                    }
                }
                
                totalDamage = Math.abs(totalDamage);
                
                // 闪避
                if ((Math.random() * 100) < (defender.dodgeRate * 100)) {
                    this.addBattleLog(`${defender.name} 闪避了攻击！`, 'info');
                    this.playBattleSound('dodge');
                    const content = document.getElementById('battle-content');
                    if (content) {
                        const defEl = content.querySelector(`[data-battle-idx="${state.heroes.indexOf(defender)}"]`);
                        if (defEl) {
                            const dodge = document.createElement('div');
                            dodge.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:900;color:#74b9ff;text-shadow:0 0 10px #74b9ff;animation:floatUp 1s forwards;z-index:80;pointer-events:none;';
                            dodge.textContent = 'MISS';
                            defEl.appendChild(dodge);
                            setTimeout(() => dodge.remove(), 1000);
                        }
                    }
                    return;
                }
                
                // 防御
                totalDamage = Math.floor(totalDamage * (1 - defender.defenseFactor));
                
                // 大招
                if (attacker.hasSkill) {
                    this.addBattleLog(`${attacker.voiceLine} 伤害×${attacker.ultimateMultiplier}`, 'crit');
                    totalDamage = Math.floor(totalDamage * attacker.ultimateMultiplier);
                    this.playBattleSound('ultimate');
                }
                
                totalDamage = Math.abs(totalDamage);
                const wasAlive = defender.HP > 0;
                defender.HP -= totalDamage;
                const isKill = wasAlive && defender.HP <= 0;
                
                const defIdx = state.heroes.indexOf(defender);
                const atkIdx = state.heroes.indexOf(attacker);
                this.showDamageNumber(defIdx, totalDamage, false, comboCount > 0);
                
                // ===== 视觉特效 =====
                const content = document.getElementById('battle-content');
                if (content) {
                    const atkEl = content.querySelector(`[data-battle-idx="${atkIdx}"]`);
                    const defEl = content.querySelector(`[data-battle-idx="${defIdx}"]`);
                    
                    // 攻击位移冲刺
                    if (atkEl && defEl) {
                        // 播放攻击/暴击音效
                        this.playBattleSound(comboCount > 0 ? 'crit' : 'attack');

                        // 友方从左往右冲，敌方从右往左冲
                        const isAttackerAlly = attacker.isAlly;
                        const dashClass = isAttackerAlly ? 'dashing-right' : 'dashing-left';
                        const returnClass = isAttackerAlly ? 'dash-return' : 'dash-return-left';

                        atkEl.classList.add(dashClass);
                        setTimeout(() => {
                            atkEl.classList.remove(dashClass);
                            atkEl.classList.add(returnClass);
                            setTimeout(() => {
                                atkEl.classList.remove(returnClass);
                            }, 300);
                        }, 200);
                    }
                    
                    // 攻击方动画
                    if (atkEl) {
                        atkEl.classList.add('attacking');
                        setTimeout(() => atkEl.classList.remove('attacking'), 500);
                    }
                    
                    if (defEl) {
                        // 受击闪红
                        defEl.classList.add('taking-damage');
                        setTimeout(() => defEl.classList.remove('taking-damage'), 500);
                        
                        // 职业攻击特效
                        defEl.insertAdjacentHTML('beforeend', this.professionVFX(attacker.primaryProfession));
                        setTimeout(() => defEl.querySelectorAll('.profession-vfx').forEach(el => el.remove()), 600);
                        
                        // 连击斩光 - 每次连击都显示一次动画
                        if (comboCount >= 1) {
                            for (let ci = 0; ci < comboCount; ci++) {
                                const delay = ci * 350;
                                setTimeout(() => {
                                    if (!defEl || !defEl.parentNode) return;
                                    let slashes = '';
                                    for (let si = 0; si < 4; si++) {
                                        slashes += `<div class="slash-line s${si + 1}"></div>`;
                                    }
                                    defEl.insertAdjacentHTML('beforeend', `<div class="vfx-combo-slash">${slashes}</div>`);
                                    setTimeout(() => defEl.querySelectorAll('.vfx-combo-slash').forEach(el => el.remove()), 800);
                                    // 每次连击都飘字
                                    this.showComboFloat(ci + 1);
                                }, delay);
                            }
                        }
                        
                        // 扣血金色闪光
                        this.showHPFlash(defIdx);
                        
                        // 处决动画 - 全屏十字斩
                        if (isKill) {
                            this.showFullscreenExecute(defender.name);
                            this.playBattleSound('kill');
                        }
                    }
                    
                    // 大招全屏闪光
                    if (attacker.hasSkill) {
                        content.insertAdjacentHTML('beforeend', '<div class="vfx-ultimate"></div>');
                        setTimeout(() => content.querySelectorAll('.vfx-ultimate').forEach(el => el.remove()), 700);
                    }
                }
                
                this.addBattleLog(`${attacker.name} 对 ${defender.name} 造成 ${totalDamage} 点伤害！${comboCount > 0 ? `（连击${comboCount}次）` : ''}${isKill ? ' ☠️ 击杀！' : ''}`, 'damage');
            }

            showHPFlash(heroIdx) {
                const content = document.getElementById('battle-content');
                if (!content) return;
                const heroEl = content.querySelector(`[data-battle-idx="${heroIdx}"]`);
                if (!heroEl) return;
                const hpBar = heroEl.querySelector('.wukong-hp-bar');
                if (!hpBar) return;
                
                // 添加金色闪 sweep
                const flash = document.createElement('div');
                flash.className = 'hp-gold-flash';
                hpBar.appendChild(flash);
                setTimeout(() => flash.remove(), 600);
                
                // 添加受伤闪光 class
                hpBar.classList.add('hp-damage');
                setTimeout(() => hpBar.classList.remove('hp-damage'), 600);
            }

            professionVFX(profession) {
                const map = {
                    0: '<div class="profession-vfx vfx-slash"></div>',
                    1: '<div class="profession-vfx vfx-arcane"></div>',
                    2: '<div class="profession-vfx vfx-heal"></div>',
                    3: '<div class="profession-vfx vfx-shield"></div>'
                };
                return map[profession] || '';
            }

            async endBattle(playerWins) {

                await this.sleep(500);
