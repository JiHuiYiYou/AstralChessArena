                    state.heroes.filter(h => !h.isAlly).forEach(h => {
                        totalLoot += h.loot || 0;
                    });
                    const diff = Math.sqrt(state.difficultySquared);
                    totalLoot = Math.floor(totalLoot * diff);
                    this.gold += totalLoot;
                    
                    let prizeAdd = diff < 100 ? Math.floor(diff) : 100;
                    this.prizeCount += prizeAdd;
                    
                    this.showToast(`战斗胜利！获得 ${totalLoot} 金币，${prizeAdd} 次转盘机会`, "success");
                } else {
                    this.showToast("战斗失败...", "error");

                this.updateResourceBar();

                const content = document.getElementById('battle-content');

            sleep(ms) {

            // ==================== 抽奖 ====================
            renderLottery(container) {
                container.innerHTML = `
                    <h2 class="section-title">🎲 <span class="title-text">幸运抽奖</span></h2>
                    <div class="text-center mb-4">
                        <button class="btn btn-gold" onclick="game.showWheel()">🎰 幸运转盘</button>

            showWheel() {
                const content = document.getElementById('lottery-content');
                if (this.prizeCount <= 0) {
                    content.innerHTML = `<p class="text-center" style="color: var(--text-secondary);">转盘次数不足，去商店购买吧！</p>`;
                    return;
                }
                
                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe'];
                
                let html = `
                    <div class="wheel-container" style="position: relative; width: 400px; height: 400px; margin: 40px auto;">
                        <div class="wheel-pointer"></div>
                        <canvas id="wheel-canvas" width="400" height="400" style="border-radius: 50%; border: 8px solid var(--accent-gold); box-shadow: 0 0 40px rgba(255,215,0,0.3);"></canvas>
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent-gold), #ffaa00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #1a1a2e; z-index: 10; box-shadow: 0 0 20px rgba(255,215,0,0.5); font-size: 20px; cursor: pointer;" onclick="game.spinWheel()">GO</div>
                    </div>
                    <div class="text-center">
                        <p style="color: var(--accent-gold); font-size: 18px; margin-bottom: 16px;">剩余次数: <span id="wheel-count">${this.prizeCount}</span></p>
                        <button class="btn btn-gold" id="spin-btn" onclick="game.spinWheel()" style="font-size: 20px; padding: 14px 48px;">🎰 开始旋转</button>
                        <p style="color: var(--text-secondary); font-size: 12px; margin-top: 8px;">点击后将自动连续旋转</p>
                    </div>
                    <div id="wheel-result" class="text-center mt-4" style="font-size: 24px; font-weight: 800; min-height: 40px;"></div>
                `;
                content.innerHTML = html;
                
                this.drawWheel(colors);
            }

            drawWheel(colors, rotation = 0) {
                const canvas = document.getElementById('wheel-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const cx = 200, cy = 200, r = 196;
                const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
                
                ctx.clearRect(0, 0, 400, 400);
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rotation * Math.PI / 180);
                ctx.translate(-cx, -cy);
                
                let startAngle = -Math.PI / 2;
                prizes.forEach((prize, i) => {
                    const sliceAngle = (prize.weight / totalWeight) * 2 * Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
                    ctx.closePath();
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 文字
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(startAngle + sliceAngle / 2);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(prize.name, r * 0.6, 5);
                    ctx.restore();
                    
                    startAngle += sliceAngle;
                });
                ctx.restore();
            }

            getPrizeByAngle(angleDeg) {
                // 指针在顶部（-90°即12点方向），angleDeg为顺时针旋转角度
                const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
                // 归一化角度到 [0, 360)
                let normalized = ((angleDeg % 360) + 360) % 360;
                // 指针在顶部，转盘顺时针旋转，所以实际指针指向 = (360 - normalized) 度
                let pointerAngle = (360 - normalized) % 360;
                let current = 0;
                for (const prize of prizes) {
                    const sectorAngle = (prize.weight / totalWeight) * 360;
                    if (pointerAngle < current + sectorAngle) return prize;
                    current += sectorAngle;
                }
                return prizes[prizes.length - 1];
            }

            spinWheel() {
                if (this.prizeCount <= 0) return;
                this.prizeCount--;
                this.updateResourceBar();
                
                const resultDiv = document.getElementById('wheel-result');
                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9', '#fd79a8', '#a29bfe'];
                const spins = 5 + Math.random() * 5;
                const finalAngle = Math.random() * 360;
                const totalAngle = spins * 360 + finalAngle;
                
                resultDiv.textContent = '旋转中...';
                // 禁用按钮防止重复点击
                const spinBtn = document.getElementById('spin-btn');
                if (spinBtn) { spinBtn.disabled = true; spinBtn.style.opacity = '0.5'; }
                
                const duration = 4000;
                const startTime = Date.now();
                const startAngle = this._wheelAngle || 0;
                const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
                let lastTickSector = Math.floor(startAngle / (360 / prizes.length));
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const currentAngle = startAngle + totalAngle * eased;
                    this.drawWheel(colors, currentAngle);

                    // 每过一个扇区播 tick 音效
                    const sectorSize = 360 / prizes.length;
                    const curSector = Math.floor(currentAngle / sectorSize);
                    if (curSector !== lastTickSector) {
                        lastTickSector = curSector;
                        sfx.playWheelTick();
                    }

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        this._wheelAngle = currentAngle;
                        const prize = this.getPrizeByAngle(currentAngle);
                        const isWin = prize.id !== 0;
                        if (isWin) sfx.playWheelWin(); else sfx.playWheelLose();
                        resultDiv.innerHTML = `<span style="color: var(--accent-gold);">🎉 ${prize.name}</span>`;
                        if (prize.id === 0) this.showToast("加油，下次会更好的！", "info");
                        this.applyPrize(prize);
                        this.updateResourceBar();
                        
                        // 更新剩余次数显示
                        const countEl = document.getElementById('wheel-count');
                        if (countEl) countEl.textContent = this.prizeCount;
                        
                        if (this.prizeCount > 0) {
                            // 自动继续
                            setTimeout(() => {
                                resultDiv.innerHTML = '<span style="color: var(--text-secondary);">下次旋转中...</span>';
                                setTimeout(() => this.spinWheel(), 500);
                            }, 1500);
                        } else {
                            if (spinBtn) { spinBtn.disabled = false; spinBtn.style.opacity = '1'; }
                            resultDiv.innerHTML += '<p style="color: var(--text-secondary); margin-top: 8px;">转盘次数已用完</p>';
                        }
                    }
                };
                requestAnimationFrame(animate);
            }

            getRandomPrize() {
                const totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
                let random = Math.random() * totalWeight;
                for (const prize of prizes) {
                    if (random < prize.weight) return prize;
                    random -= prize.weight;
                }
                return prizes[0];
            }

            applyPrize(prize) {
                switch(prize.id) {
                    case 1: this.gold += 20; break;
                    case 2: this.openBoxes++; break;
                    case 3: this.breakthroughTickets++; break;
                    case 4: this.upgradeTickets++; break;
                    case 5: this.drugG++; break;
                    case 6: this.prizeCount += 10; break;
                    case 7: this.reforgeTickets++; break;
                }
            }

                }
                
                const skipAnim = localStorage.getItem('starChess_skipAnim') === '1';
                content.innerHTML = `
                    <div class="text-center">
                        <div style="margin-bottom:16px;">

                                ${skipAnim ? '⚡ 动画已跳过' : '⏩ 跳过动画'}
                            </button>
                        </div>
                        <div id="box-anim-area" style="margin: 40px 0; position: relative; min-height: 160px;">

                        ${this.openBoxes >= 10 ? `<button class="btn btn-gold" onclick="game.openMagicBoxTen()" style="font-size: 18px; padding: 14px 40px;">🌟 十连抽</button>` : ''}
                        ${this.openBoxes >= 5 && this.openBoxes < 10 ? `<button class="btn btn-gold" onclick="game.openMagicBoxFive()" style="font-size: 18px; padding: 14px 40px;">🌟 五连抽</button>` : ''}

                // 保留上次抽卡结果

                    const results = document.getElementById('box-results');

            toggleSkipAnim() {
                const current = localStorage.getItem('starChess_skipAnim') === '1';
                localStorage.setItem('starChess_skipAnim', current ? '0' : '1');
                this.showMagicBox();
            }

            _getCardColors() {
                return ['#ff6b6b','#4ecdc4','#b829dd','#2d8cf0','#ffd700','#2ed573','#e17055','#a29bfe','#fd79a8','#00b894'];
            }

            _renderCardHTML(card) {
                const colors = this._getCardColors();
                const color = colors[card.type % colors.length];
                // 冷却卡显示反转：+ 显示为 -，× 显示为 ÷
                let opDisplay = operations[card.operation];
                if (card.type === 6) {
                    if (card.operation === 0) opDisplay = '-';
                    else if (card.operation === 2) opDisplay = '÷';
                }
                return `
                    <span>
                        <span class="card-type-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">${types[card.type]}</span>
                        ${opDisplay}${card.value.toFixed(3)}
                    </span>
                    <span style="color:${color};font-weight:700;">#${card.cardID}</span>
                `;
            }

            _renderCardsInstant(cards, container) {
                cards.forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card-item card-reveal';
                    div.innerHTML = this._renderCardHTML(card);
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }

            _renderCardsAnimated(cards, container, startDelay) {
                cards.forEach((card, i) => {
                    setTimeout(() => {
                        sfx.playCardReveal();
                        const div = document.createElement('div');
                        div.className = 'card-item card-reveal';
                        div.style.animationDelay = `${i * 0.1}s`;
                        div.innerHTML = this._renderCardHTML(card);
                        container.appendChild(div);
                        container.scrollTop = container.scrollHeight;
                    }, startDelay + i * 200);
                });
            }

            openMagicBox() {
                if (this.openBoxes <= 0) return;
                const skipAnim = localStorage.getItem('starChess_skipAnim') === '1';
                const box = document.getElementById('magic-box');
                const animArea = document.getElementById('box-anim-area');
                if (!box || box.classList.contains('opening')) return;
                
                if (skipAnim) {
                    const count = Math.min(this.openBoxes, 5);
                    const newCards = [];
                    for (let i = 0; i < count; i++) {
                        if (this.openBoxes <= 0) break;
                        this.openBoxes--;
                        newCards.push(this._generateCard());
                    }
                    sfx.playBoxOpen();
                    document.getElementById('box-count').textContent = this.openBoxes;
                    this.updateResourceBar();
                    this.showMagicBox(newCards);
                    return;
                }

                box.classList.add('opening');
                sfx.playBoxOpen();
                const count = Math.min(this.openBoxes, 5);
                const newCards = [];
                for (let i = 0; i < count; i++) {
                    if (this.openBoxes <= 0) break;
                    this.openBoxes--;
                    newCards.push(this._generateCard());
                }
                document.getElementById('box-count').textContent = this.openBoxes;
                this.updateResourceBar();

                // 光效爆发
                setTimeout(() => {
                    const burst = document.createElement('div');
                    burst.className = 'box-glow-burst';
                    animArea.appendChild(burst);
                    setTimeout(() => burst.remove(), 900);
                }, 100);

                // 动画结束后刷新界面并显示结果
                setTimeout(() => {
                    this.showMagicBox(newCards);
                }, 800);
            }

            openMagicBoxFive() {
                if (this.openBoxes < 5) return;
                this._multiPull(5);
            }

            openMagicBoxTen() {
                if (this.openBoxes < 10) return;
                this._multiPull(10);
            }

            _multiPull(count) {
                const skipAnim = localStorage.getItem('starChess_skipAnim') === '1';
                const newCards = [];
                for (let i = 0; i < count; i++) {
                    if (this.openBoxes <= 0) break;
                    this.openBoxes--;
                    newCards.push(this._generateCard());
                }
                sfx.playBoxOpen();
                if (skipAnim) {
                    document.getElementById('box-count').textContent = this.openBoxes;
                    this.updateResourceBar();
                    this.showMagicBox(newCards);
                } else {
                    const results = document.getElementById('box-results');
                    this._renderCardsAnimated(newCards, results, 100);
                    const totalTime = 100 + newCards.length * 200;
                    setTimeout(() => {
                        document.getElementById('box-count').textContent = this.openBoxes;
                        this.updateResourceBar();
                        this.showMagicBox(newCards);
                    }, totalTime);
                }
            }

            _generateCard() {
                const cardSelection = Math.floor(Math.random() * 10000);
                const card = {
                    cardID: this.cardIndex,
                    type: Math.floor(cardSelection / 1000),
                    operation: cardSelection % 4,
                    isUsed: false,
                    useHero: -1
                };
                let finalValue = cardSelection % 1000;
                if (card.type === 0 || card.type === 4) {
                    if (card.operation % 2 !== 0) card.operation--;
                    if (card.operation === 0) finalValue /= 10;
                    if (card.operation === 2) finalValue = 1.00 + finalValue / 1000;
                } else if (card.type === 1 || card.type === 7 || card.type === 8) {
                    if (card.operation % 2 !== 0) card.operation--;
                    if (card.operation === 0) finalValue /= 10000;
                    if (card.operation === 2) finalValue = 1.00 + finalValue / 1000;
                } else if (card.type === 2 || card.type === 5 || card.type === 9) {
                    if (card.operation % 2 !== 0) card.operation--;
                    if (card.operation === 0) finalValue /= 1000;
                    if (card.operation === 2) finalValue = 1.00 + finalValue / 1000;
                } else if (card.type === 3) {
                    if (card.operation % 2 !== 0) card.operation--;
                    if (card.operation === 0) finalValue /= 20;
                    if (card.operation === 2) finalValue = 1.00 + finalValue / 1000;
                } else if (card.type === 6) {
                    // 大招冷却：只保留加法(+)和乘法(×)，且数值要合理
                    if (card.operation === 1) card.operation = 0; // 减法→加法
                    if (card.operation === 3) card.operation = 2; // 除法→乘法
                    if (card.operation === 0) finalValue = Math.floor(finalValue / 500); // 加法值 0~2
                    if (card.operation === 2) finalValue = 1.00 + (finalValue % 200) / 1000; // 乘法 1.0~1.2
                }
                // 修正：大招冷却卡牌数值上限保护
                if (card.type === 6) {
                    if (card.operation === 2) {
                        // 乘法：限制在 1.0 ~ 2.0
                        finalValue = Math.min(2.0, Math.max(1.0, finalValue));
                    } else if (card.operation === 0) {
                        // 加法：限制在 0 ~ 2
                        finalValue = Math.min(2, Math.max(0, Math.floor(finalValue)));
                    }
                }
                card.value = finalValue;
                this.cards[this.cardIndex] = card;
                this.cardIndex++;
                return card;
            }

            // ==================== 商店 ====================
            renderShop(container) {
                container.innerHTML = `
                    <h2 class="section-title">🏪 <span class="title-text">星际商店</span></h2>
                    <p class="text-center" style="color: var(--accent-gold); font-size: 20px; margin-bottom: 24px;">当前金币: <span id="shop-gold-display">${this.gold}</span></p>
                    <div class="shop-grid">
                        ${this.market.map((item, i) => `
                            <div class="shop-item" onclick="game.quickBuy(${i})">
                                <div class="shop-item-icon">${this.getItemIcon(i)}</div>
                                <div class="shop-item-name">${item.name}</div>
                                <div class="shop-item-price">${item.price} 金币</div>
                                <button class="btn btn-primary" style="width: 48%; display: inline-block;">单买</button>
                                <button class="btn btn-gold" style="width: 48%; display: inline-block;" onclick="event.stopPropagation(); game.buyItem(${i})">批量</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            getItemIcon(idx) {
                const icons = ['💊', '📜', '⚡', '🎰', '🎁', '🔥'];
                return icons[idx] || '📦';
            }

            quickBuy(idx) {
                const item = this.market[idx];
                if (this.gold < item.price) {
                    this.showToast("金币不足！", "error");
                    return;
                }
                this.gold -= item.price;
                this._addItem(idx, 1);
                this.showToast(`购买 1 个${item.name}`, "success");
                this.updateResourceBar();
                // 更新商店金币显示
                const goldEl = document.getElementById('shop-gold-display');
                if (goldEl) goldEl.textContent = this.gold;
            }

            buyItem(idx) {
                const item = this.market[idx];
                const maxAfford = Math.floor(this.gold / item.price);
                this.showModal(`
                    <h3 class="modal-title"><span class="title-text">购买 ${item.name}</span></h3>
                    <p style="color: var(--text-secondary); margin-bottom: 16px;">单价: ${item.price} 金币 | 可购买: ${maxAfford} 个</p>
                    <div class="input-group">
                        <label>购买数量</label>
                        <input type="number" id="buy-quantity" value="1" min="1" max="${maxAfford}" oninput="document.getElementById('buy-total').textContent = parseInt(this.value||0) * ${item.price}">
                    </div>
                    <p style="color: var(--accent-gold); margin-bottom: 16px;">总计: <span id="buy-total">${item.price}</span> 金币</p>
                    <div class="flex justify-center gap-4">
                        <button class="btn btn-primary" onclick="game.confirmBuy(${idx})">确认购买</button>
                        <button class="btn btn-secondary" onclick="game.closeModal()">取消</button>
                    </div>
                `);
            }

            confirmBuy(idx) {
                const item = this.market[idx];
                const num = parseInt(document.getElementById('buy-quantity').value);
                if (isNaN(num) || num <= 0) return;
                
                const total = num * item.price;
                if (total > this.gold) {
                    this.showToast("金币不足！", "error");
                    return;
                }
                
                this.gold -= total;
                this._addItem(idx, num);
                
                this.closeModal();
                this.showToast(`成功购买 ${num} 个${item.name}`, "success");
                this.updateResourceBar();
                this.renderShop(document.getElementById('main-content'));
            }

            _addItem(idx, num) {
                switch(idx) {
                    case 0: this.drugG += num; break;
                    case 1: this.upgradeTickets += num; break;
                    case 2: this.breakthroughTickets += num; break;
                    case 3: this.prizeCount += num; break;
                    case 4: this.openBoxes += num; break;
                    case 5: this.reforgeTickets += num; break;
                }
            }

            // ==================== 工具 ====================
            showModal(html) {
                document.getElementById('modal-content').innerHTML = html;
                document.getElementById('modal').classList.add('active');
            }

            closeModal() {
                document.getElementById('modal').classList.remove('active');
            }

            // ==================== 存档系统 ====================
            _getSaveData() {
                return {
                    gold: this.gold,
                    prizeCount: this.prizeCount,
                    openBoxes: this.openBoxes,
                    upgradeTickets: this.upgradeTickets,
                    breakthroughTickets: this.breakthroughTickets,
                    reforgeTickets: this.reforgeTickets,
                    drugG: this.drugG,
                    heroes: this.heroes,
                    cards: this.cards,
                    cardIndex: this.cardIndex,
                    n: this.n,
                    battleSpeed: this.battleSpeed,
                    market: this.market,
                    savedAt: new Date().toISOString()
                };
            }

            _applySaveData(data) {
                this.gold = data.gold || 0;
                this.prizeCount = data.prizeCount || 0;
                this.openBoxes = data.openBoxes || 0;
                this.upgradeTickets = data.upgradeTickets || 0;
                this.breakthroughTickets = data.breakthroughTickets || 0;
                this.reforgeTickets = data.reforgeTickets || 0;
                this.drugG = data.drugG || 0;
                this.heroes = data.heroes || [];
                this.cards = data.cards || [];
                this.cardIndex = data.cardIndex || 0;
                this.n = data.n || 2;
                if (data.market) this.market = data.market;
                if (data.battleSpeed) this.battleSpeed = data.battleSpeed;
                // 加载存档后修正超模数据
                this.heroes.forEach(h => { if (h && h.exist) this.clampHeroStats(h); });
                this.updateResourceBar();
            }

            _getSaveList() {
                try {
                    const raw = localStorage.getItem('starChess_saves');
                    return raw ? JSON.parse(raw) : [];
                } catch { return []; }
            }

            _writeSaveList(saves) {
                try {
                    localStorage.setItem('starChess_saves', JSON.stringify(saves));
                } catch (e) { this.showToast("存储空间不足！", "error"); }
            }

            _migrateOldSave() {
                const old = localStorage.getItem('starChess_save');
                if (old) {
                    try {
                        const data = JSON.parse(old);
                        const saves = this._getSaveList();
                        if (saves.length === 0) {
                            saves.push({ slot: 1, data });
                            this._writeSaveList(saves);
                        }
                        localStorage.removeItem('starChess_save');
                    } catch {}
                }
            }

            showSavePanel() {
                this._migrateOldSave();
                const saves = this._getSaveList();
                const main = document.getElementById('main-content');
                
                let slotsHtml = '';
                for (let i = 1; i <= 3; i++) {
                    const save = saves.find(s => s.slot === i);
                    if (save) {
                        const d = save.data;
                        const time = d.savedAt ? new Date(d.savedAt).toLocaleString() : '未知';
                        const heroCount = (d.heroes || []).filter(h => h && h.exist).length;
                        const allyCount = (d.heroes || []).filter(h => h && h.exist && h.isAlly).length;
                        slotsHtml += `
                            <div class="save-slot">
                                <div class="save-slot-header">
                                    <div class="save-slot-title">📁 存档 ${i}</div>
                                    <div class="save-slot-time">${time}</div>
                                </div>
                                <div class="save-slot-info">
                                    <span>💰 ${d.gold || 0} 金币</span>
                                    <span>👥 ${allyCount} 我方 / ${heroCount - allyCount} 敌方</span>
                                    <span>📜 ${(d.cards || []).filter(c => c && !c.isUsed).length} 张卡牌</span>
                                </div>
                                <div class="save-slot-actions">
                                    <button class="btn btn-primary" style="padding:8px 16px;font-size:13px;" onclick="game.loadSaveSlot(${i})">📂 读取</button>
                                    <button class="btn btn-gold" style="padding:8px 16px;font-size:13px;" onclick="game.saveToSlot(${i})">💾 覆盖</button>
                                    <button class="btn btn-danger" style="padding:8px 16px;font-size:13px;" onclick="game.deleteSaveSlot(${i})">🗑️ 删除</button>
                                </div>
                            </div>
                        `;
                    } else {
                        slotsHtml += `
                            <div class="save-slot" style="opacity: 0.5;">
                                <div class="save-slot-header">
                                    <div class="save-slot-title">📁 存档 ${i}</div>
                                    <div class="save-slot-time">空</div>
                                </div>
                                <div class="save-slot-actions">
                                    <button class="btn btn-success" style="padding:8px 16px;font-size:13px;" onclick="game.saveToSlot(${i})">💾 保存到此槽位</button>
                                </div>
                            </div>
                        `;
                    }
                }
                
                main.innerHTML = `
                    <h2 class="section-title">💾 <span class="title-text">存档管理</span></h2>
                    <div class="save-panel">
                        ${slotsHtml}
                        <p class="text-center mt-4" style="color: var(--text-secondary); font-size: 12px;">自动存档会在锻造、融合、战斗后触发到槽位 1</p>
                    </div>
                `;
            }

            saveToSlot(slot) {
                const saves = this._getSaveList();
                const existing = saves.findIndex(s => s.slot === slot);
                const entry = { slot, data: this._getSaveData() };
                if (existing >= 0) saves[existing] = entry;
                else saves.push(entry);
                this._writeSaveList(saves);
                this.showToast(`已保存到存档 ${slot}`, "success");
                this.showSavePanel();
            }

            loadSaveSlot(slot) {
                const saves = this._getSaveList();
                const save = saves.find(s => s.slot === slot);
                if (!save) {
                    this.showToast("该槽位为空！", "error");
                    return;
                }
                this._applySaveData(save.data);
                this.showToast(`存档 ${slot} 已加载`, "success");
                this.showSection('workshop');
            }

            deleteSaveSlot(slot) {
                const saves = this._getSaveList().filter(s => s.slot !== slot);
                this._writeSaveList(saves);
                this.showToast(`存档 ${slot} 已删除`, "info");
                this.showSavePanel();
            }

            autoSave() {
                const saves = this._getSaveList();
                const entry = { slot: 1, data: this._getSaveData() };
                const existing = saves.findIndex(s => s.slot === 1);
                if (existing >= 0) saves[existing] = entry;
                else saves.push(entry);
                this._writeSaveList(saves);
            }

            hasSave() {
                return this._getSaveList().length > 0;
            }

            deleteSave() {
                this._writeSaveList([]);
            }

            showDamageNumber(heroIdx, amount, isHeal = false, isCrit = false) {
                const content = document.getElementById('battle-content');
                if (!content) return;
                const heroEl = content.querySelector(`[data-battle-idx="${heroIdx}"]`);
                if (!heroEl) return;
                
                const num = document.createElement('div');
                num.className = `damage-number ${isCrit ? 'crit' : ''} ${isHeal ? 'heal-number' : ''}`;
                num.textContent = isHeal ? `+${Math.floor(amount)}` : `-${Math.floor(amount)}`;
                heroEl.style.position = 'relative';
                heroEl.appendChild(num);
                setTimeout(() => num.remove(), 1500);
            }

            showFullscreenExecute(heroName) {
                const vfx = document.createElement('div');
                vfx.className = 'vfx-execute-fullscreen';
                vfx.innerHTML = `
                    <div class="cross-slash">
                        <div class="slash-h"></div>
                        <div class="slash-v"></div>
                    </div>
                    <div class="execute-skull">☠️</div>
                    <div class="execute-text">处 决</div>
                `;
                document.body.appendChild(vfx);
                // 慢放效果：暂停战斗循环
                const oldSpeed = this.battleSpeed;
                this.battleSpeed = Math.max(1, oldSpeed * 0.25);
                setTimeout(() => {
                    this.battleSpeed = oldSpeed;
                    vfx.remove();
                }, 1200);
            }

            showComboFloat(combo) {
                const el = document.createElement('div');
                el.className = 'combo-float';
                el.textContent = combo > 1 ? `${combo} HIT COMBO!` : `${combo} HIT!`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1500);
            }
        }

        // 初始化游戏
        const game = new Game();

        // 模态框点击外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') game.closeModal();
        });
        
        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') game.closeModal();
        });
    </script>
</body>
</html>
