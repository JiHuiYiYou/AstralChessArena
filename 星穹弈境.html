
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5021/5021753.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星穹弈境 - 自走棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1f;
            --bg-secondary: #121832;
            --bg-card: rgba(20, 25, 50, 0.85);
            --accent-gold: #ffd700;
            --accent-purple: #b829dd;
            --accent-blue: #2d8cf0;
            --accent-red: #ff4757;
            --accent-green: #2ed573;
            --text-primary: #e0e6ed;
            --text-secondary: #8892b0;
            --border-glow: rgba(255, 215, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景粒子 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .game-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .status-bar {
            background: linear-gradient(135deg, rgba(18, 24, 50, 0.95), rgba(30, 35, 70, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,215,0,0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .status-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.05), transparent);
            animation: statusBarShimmer 6s infinite;
        }
        @keyframes statusBarShimmer {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
            position: relative;
        }
        .resource-item:hover {
            transform: translateY(-2px);
            border-color: rgba(255,215,0,0.4);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,255,255,0.04));
        }

        .resource-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .resource-value {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent-gold);
            min-width: 30px;
            text-align: center;
            text-shadow: 0 0 8px rgba(255,215,0,0.3);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            background: linear-gradient(180deg, rgba(20, 25, 50, 0.9), rgba(12, 16, 35, 0.95));
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }
        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 3px;
            position: relative;
            padding-bottom: 12px;
            color: var(--accent-gold);
        }
        .section-title .title-text {
            background: linear-gradient(135deg, var(--accent-gold), #ffaa00, #ff8c00);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        /* 底部导航 */
        .nav-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(18, 24, 50, 0.95), rgba(12, 16, 35, 0.98));
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s;
            border-radius: 1px;
        }
        .nav-btn:hover::after {
            width: 60%;
        }

        .nav-btn:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(255,215,0,0.08), rgba(255,255,255,0.04));
            border-color: rgba(255,215,0,0.2);
        }

        .nav-btn.active {
            color: var(--accent-gold);
            background: linear-gradient(180deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 0 16px rgba(255,215,0,0.1), inset 0 1px 0 rgba(255,215,0,0.2);
        }
        .nav-btn.active::after {
            width: 80%;
        }

        /* 按钮样式 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin: 6px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
            transition: left 0.4s;
        }
        .btn:hover::before { left: 100%; }
        .btn:active { transform: scale(0.97) !important; }

        .btn-primary {
            background: linear-gradient(180deg, rgba(255,215,0,0.2), rgba(255,215,0,0.08));
            color: var(--accent-gold);
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.15), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(255,215,0,0.3), rgba(255,215,0,0.12));
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .btn-gold {
            background: linear-gradient(180deg, #ffe066, #ffd700, #e6a800);
            color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.4);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .btn-danger {
            background: linear-gradient(180deg, rgba(255,71,87,0.2), rgba(255,71,87,0.08));
            color: var(--accent-red);
            border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: 0 4px 16px rgba(255, 71, 87, 0.15), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(255,71,87,0.3), rgba(255,71,87,0.12));
            box-shadow: 0 6px 24px rgba(255, 71, 87, 0.25);
        }

        .btn-success {
            background: linear-gradient(180deg, rgba(46,213,115,0.2), rgba(46,213,115,0.08));
            color: var(--accent-green);
            border: 1px solid rgba(46, 213, 115, 0.3);
            box-shadow: 0 4px 16px rgba(46, 213, 115, 0.15), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(46,213,115,0.3), rgba(46,213,115,0.12));
            box-shadow: 0 6px 24px rgba(46, 213, 115, 0.25);
        }

        .btn-secondary {
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
        }

        /* 英雄卡片 */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .hero-card {
            background: linear-gradient(135deg, rgba(25, 30, 60, 0.95), rgba(15, 18, 40, 0.98));
            border: 1px solid rgba(255, 215, 0, 0.12);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hero-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .hero-card:hover::before { opacity: 1; }
        .hero-card:hover::after { opacity: 1; }

        .hero-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 12px 32px rgba(255, 215, 0, 0.12), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .hero-card.selected {
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.2), 0 8px 24px rgba(255,215,0,0.15);
        }
        .hero-card.selected::before { opacity: 1; }

        .hero-card.dead {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .hero-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hero-name {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255,215,0,0.2);
        }

        .hero-level {
            background: linear-gradient(135deg, rgba(184,41,221,0.3), rgba(142,68,173,0.2));
            color: #d8a0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(184,41,221,0.3);
        }

        .hero-profession {
            font-size: 14px;
            color: var(--accent-blue);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            background: linear-gradient(135deg, rgba(0,0,0,0.25), rgba(0,0,0,0.15));
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--text-primary);
            font-weight: 700;
        }

        .hp-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), #ff6b81);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .hp-fill.ally {
            background: linear-gradient(90deg, var(--accent-green), #7bed9f);
        }

        /* 战斗场景 */
        .battle-arena {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin: 20px 0;
            min-height: 400px;
        }

        .battle-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .battle-side-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .ally-title {
            color: var(--accent-green);
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .enemy-title {
            color: var(--accent-red);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .battle-hero.attacking {
            animation: attackShake 0.5s;
            border-color: var(--accent-gold);
        }

        .battle-hero.taking-damage {
            animation: damageFlash 0.5s;
        }

        @keyframes attackShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) scale(1.05); }
            75% { transform: translateX(10px) scale(1.05); }
        }

        @keyframes damageFlash {
            0%, 100% { background: rgba(20, 25, 50, 0.8); }
            50% { background: rgba(255, 71, 87, 0.3); }
        }

        /* ===== 战斗英雄卡片 (黑神话风格) ===== */
        .battle-hero {
            background: linear-gradient(135deg, rgba(15, 18, 35, 0.95), rgba(25, 28, 55, 0.9));
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 14px;
            padding: 14px 16px;
            position: relative;
            transition: all 0.3s;
            overflow: visible;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .battle-hero.ally-hero {
            border-left: 3px solid rgba(46, 213, 115, 0.5);
            box-shadow: inset 0 0 30px rgba(46, 213, 115, 0.03);
        }
        .battle-hero.enemy-hero {
            border-left: 3px solid rgba(255, 71, 87, 0.5);
            box-shadow: inset 0 0 30px rgba(255, 71, 87, 0.03);
        }

        /* 英雄虚影头像 */
        .hero-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            border: 2px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.15), inset 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .ally-hero .hero-avatar {
            background: radial-gradient(circle, rgba(46, 213, 115, 0.15), rgba(10, 14, 31, 0.9));
            border-color: rgba(46, 213, 115, 0.5);
        }
        .enemy-hero .hero-avatar {
            background: radial-gradient(circle, rgba(255, 71, 87, 0.15), rgba(10, 14, 31, 0.9));
            border-color: rgba(255, 71, 87, 0.5);
        }
        .hero-avatar svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 4px rgba(255,215,0,0.3));
        }
        .dead-hero .hero-avatar {
            filter: grayscale(1) brightness(0.5);
            opacity: 0.5;
        }

        .battle-hero-info {
            flex: 1;
            min-width: 0;
        }

        /* ===== 黑神话风格血条 ===== */
        .wukong-hp-bar {
            position: relative;
            height: 18px;
            margin-top: 8px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(20,10,5,0.9));
            border: 2px solid;
            border-image: linear-gradient(90deg, #8B6914, #DAA520, #FFD700, #DAA520, #8B6914) 1;
            clip-path: polygon(4px 0, calc(100% - 4px) 0, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 0 calc(100% - 4px), 0 4px);
            overflow: hidden;
        }
        .wukong-hp-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
            pointer-events: none;
        }
        .wukong-hp-fill {
            height: 100%;
            position: relative;
            transition: width 0.5s ease;
        }
        .wukong-hp-fill.ally-fill {
            background: linear-gradient(90deg, #1a5c2e, #2ed573, #7bed9f);
            box-shadow: 0 0 8px rgba(46, 213, 115, 0.5), inset 0 -2px 4px rgba(0,0,0,0.3);
        }
        .wukong-hp-fill.enemy-fill {
            background: linear-gradient(90deg, #8B0000, #ff4757, #ff6b81);
            box-shadow: 0 0 8px rgba(255, 71, 87, 0.5), inset 0 -2px 4px rgba(0,0,0,0.3);
        }
        .wukong-hp-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            animation: hpShimmer 2.5s infinite;
        }
        @keyframes hpShimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        /* 血条刻度线 */
        .wukong-hp-fill .tick-marks {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 9.5%, rgba(0,0,0,0.25) 9.5%, rgba(0,0,0,0.25) 10.5%);
            pointer-events: none;
        }
        .wukong-hp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 6px rgba(0,0,0,0.5);
            z-index: 2;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        /* 血条两端装饰 */
        .wukong-hp-bar .hp-ornament {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 12px;
            background: linear-gradient(180deg, #FFD700, #8B6914);
            z-index: 3;
            clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
        }
        .wukong-hp-bar .hp-ornament.left { left: -1px; }
        .wukong-hp-bar .hp-ornament.right { right: -1px; }

        .battle-hero-name {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .battle-hero-name strong {
            font-size: 15px;
        }
        .ally-hero .battle-hero-name strong { color: #7bed9f; }
        .enemy-hero .battle-hero-name strong { color: #ff6b81; }
        .skill-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }
        .skill-ready {
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,170,0,0.2));
            color: #FFD700;
            border: 1px solid rgba(255,215,0,0.4);
            animation: skillPulse 1.5s infinite;
        }
        .skill-cooldown {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes skillPulse {
            0%, 100% { box-shadow: 0 0 4px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 12px rgba(255,215,0,0.6); }
        }
        .battle-hero-stats {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ===== 职业技能动画 ===== */
        .battle-hero { position: relative; overflow: visible; }
        .profession-vfx {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
        /* 影刃 - 斩击 */
        .vfx-slash {
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .vfx-slash::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -20%;
            width: 140%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff4757, #ff6b81, transparent);
            transform: translateY(-50%) rotate(-25deg);
            animation: slashCut 0.4s ease-out forwards;
            box-shadow: 0 0 15px #ff4757, 0 0 30px rgba(255,71,87,0.5);
        }
        @keyframes slashCut {
            0% { opacity: 0; transform: translateY(-50%) rotate(-25deg) scaleX(0); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50%) rotate(-25deg) scaleX(1); }
        }
        /* 奥术师 - 能量爆裂 */
        .vfx-arcane {
            top: 50%; left: 50%;
            width: 80px; height: 80px;
            transform: translate(-50%, -50%);
        }
        .vfx-arcane::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 3px solid rgba(184, 41, 221, 0.8);
            border-radius: 50%;
            animation: arcaneExpand 0.5s ease-out forwards;
        }
        .vfx-arcane::after {
            content: '✦';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #b829dd;
            text-shadow: 0 0 20px #b829dd, 0 0 40px rgba(184,41,221,0.5);
            animation: arcaneStar 0.5s ease-out forwards;
        }
        @keyframes arcaneExpand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        @keyframes arcaneStar {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.5) rotate(360deg); opacity: 0; }
        }
        /* 圣疗者 - 治愈光环 */
        .vfx-heal {
            top: 50%; left: 50%;
            width: 70px; height: 70px;
            transform: translate(-50%, -50%);
        }
        .vfx-heal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid rgba(46, 213, 115, 0.6);
            border-radius: 50%;
            animation: healPulse 0.6s ease-out forwards;
        }
        .vfx-heal::after {
            content: '✚';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #2ed573;
            text-shadow: 0 0 15px #2ed573;
            animation: healCross 0.6s ease-out forwards;
        }
        @keyframes healPulse {
            0% { transform: scale(0.3); opacity: 1; box-shadow: 0 0 20px rgba(46,213,115,0.5); }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes healCross {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        /* 铁卫 - 护盾冲击 */
        .vfx-shield {
            top: 50%; left: 50%;
            width: 60px; height: 70px;
            transform: translate(-50%, -50%);
        }
        .vfx-shield::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 60px;
            border: 3px solid rgba(45, 140, 240, 0.7);
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            animation: shieldSlam 0.4s ease-out forwards;
            box-shadow: 0 0 20px rgba(45,140,240,0.4);
        }
        .vfx-shield::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: #2d8cf0;
            border-radius: 50%;
            animation: shieldImpact 0.4s ease-out forwards;
        }
        @keyframes shieldSlam {
            0% { transform: translateX(-50%) scale(2); opacity: 0; }
            40% { transform: translateX(-50%) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) scale(1.2); opacity: 0; }
        }
        @keyframes shieldImpact {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 5px #2d8cf0; }
            100% { transform: translate(-50%, -50%) scale(40); opacity: 0; box-shadow: 0 0 30px #2d8cf0; }
        }
        /* 大招闪光 */
        .vfx-ultimate {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,215,0,0.3), transparent 70%);
            animation: ultimateFlash 0.6s ease-out forwards;
            z-index: 200;
            pointer-events: none;
        }
        @keyframes ultimateFlash {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }

        .damage-number {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 900;
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.8);
            animation: floatUp 1.5s forwards;
            pointer-events: none;
            z-index: 100;
        }

        .damage-number.crit {
            color: var(--accent-gold);
            font-size: 32px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .heal-number {
            color: var(--accent-green);
            text-shadow: 0 0 10px rgba(46, 213, 115, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-60px) scale(1.3); }
        }

        /* ===== 扣血金色过渡 + 血条受伤闪光 ===== */
        .wukong-hp-bar.hp-damage .wukong-hp-fill {
            animation: hpDamageFlash 0.6s ease-out;
        }
        .wukong-hp-bar .hp-gold-flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), rgba(255,255,255,0.8), rgba(255,215,0,0.6), transparent);
            animation: goldFlashSweep 0.5s ease-out forwards;
            z-index: 5;
            pointer-events: none;
        }
        @keyframes hpDamageFlash {
            0% { filter: brightness(1); }
            20% { filter: brightness(2.5) saturate(2); }
            50% { filter: brightness(1.8) hue-rotate(30deg); }
            100% { filter: brightness(1); }
        }
        @keyframes goldFlashSweep {
            0% { opacity: 0; transform: translateX(-80%); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: translateX(80%); }
        }
        /* 延迟血量更新，先闪金光再掉血 */
        .wukong-hp-fill.delay-shrink {
            transition: width 0.8s ease-out 0.3s;
        }

        /* ===== 连击斩光特效 ===== */
        .vfx-combo-slash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 60;
        }
        .vfx-combo-slash .slash-line {
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FFD700, #fff, #FFD700, transparent);
            transform-origin: center;
            box-shadow: 0 0 8px #FFD700, 0 0 20px rgba(255,215,0,0.5);
            opacity: 0;
        }
        .slash-line.s1 { animation: comboSlash1 0.3s 0.0s ease-out forwards; }
        .slash-line.s2 { animation: comboSlash2 0.3s 0.15s ease-out forwards; }
        .slash-line.s3 { animation: comboSlash3 0.3s 0.30s ease-out forwards; }
        .slash-line.s4 { animation: comboSlash1 0.25s 0.45s ease-out forwards; height: 3px; }
        @keyframes comboSlash1 {
            0% { opacity: 0; transform: translateY(-50%) rotate(-20deg) scaleX(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50%) rotate(-20deg) scaleX(1); }
        }
        @keyframes comboSlash2 {
            0% { opacity: 0; transform: translateY(-50%) rotate(15deg) scaleX(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50%) rotate(15deg) scaleX(1); }
        }
        @keyframes comboSlash3 {
            0% { opacity: 0; transform: translateY(-50%) rotate(-35deg) scaleX(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50%) rotate(-35deg) scaleX(1); }
        }

        /* ===== 处决动画 ===== */
        .vfx-execute {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 70;
        }
        .vfx-execute::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: executeBurst 0.6s ease-out forwards;
        }
        .vfx-execute::after {
            content: '☠';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 48px;
            animation: executeSkull 0.8s 0.2s ease-out forwards;
            filter: drop-shadow(0 0 15px rgba(255,71,87,0.8));
        }
        @keyframes executeBurst {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; box-shadow: 0 0 5px #fff; }
            50% { opacity: 1; box-shadow: 0 0 30px #FFD700, 0 0 60px #ff4757; }
            100% { transform: translate(-50%, -50%) scale(60); opacity: 0; }
        }
        @keyframes executeSkull {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); opacity: 0; }
        }
        .dead-hero {
            animation: deathFade 1s ease-out forwards;
        }
        @keyframes deathFade {
            0% { filter: brightness(1) saturate(1); }
            20% { filter: brightness(3) saturate(0); }
            50% { filter: brightness(1.5) saturate(0); }
            100% { filter: brightness(0.4) saturate(0) grayscale(1); opacity: 0.4; }
        }

        /* ===== 攻击位移 ===== */
        .battle-hero.dashing-right {
            animation: dashRight 0.2s cubic-bezier(0.4, 0, 1, 1) forwards;
            z-index: 100;
        }
        .battle-hero.dashing-left {
            animation: dashLeft 0.2s cubic-bezier(0.4, 0, 1, 1) forwards;
            z-index: 100;
        }
        .battle-hero.dash-return {
            animation: dashReturn 0.3s cubic-bezier(0, 0, 0.2, 1) forwards;
        }
        @keyframes dashRight {
            0% { transform: translate(0, 0); filter: brightness(1); }
            50% { filter: brightness(1.4); }
            100% { transform: translate(60%, 0) scale(1.08); filter: brightness(1.3); }
        }
        @keyframes dashLeft {
            0% { transform: translate(0, 0); filter: brightness(1); }
            50% { filter: brightness(1.4); }
            100% { transform: translate(-60%, 0) scale(1.08); filter: brightness(1.3); }
        }
        @keyframes dashReturn {
            0% { transform: translate(60%, 0) scale(1.08); filter: brightness(1.3); }
            100% { transform: translate(0, 0) scale(1); filter: brightness(1); }
        }
        @keyframes dashReturnLeft {
            0% { transform: translate(-60%, 0) scale(1.08); filter: brightness(1.3); }
            100% { transform: translate(0, 0) scale(1); filter: brightness(1); }
        }
        .battle-hero.dash-return-left {
            animation: dashReturnLeft 0.3s cubic-bezier(0, 0, 0.2, 1) forwards;
        }
        .battle-hero.dashing-right .hero-avatar,
        .battle-hero.dashing-left .hero-avatar {
            box-shadow: 0 0 24px rgba(255, 215, 0, 0.7), 0 0 48px rgba(255, 215, 0, 0.3);
        }

        /* 战斗中隐藏控制面板 */
        .battle-controls.hidden {
            display: none;
        }

        /* 音乐按钮状态 */
        .nav-btn.muted {
            opacity: 0.5;
        }

        /* 音量控制滑条 */
        .volume-control {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .volume-control.show {
            display: flex;
        }
        .volume-control label {
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-gold);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(255,215,0,0.5);
        }
        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-gold);
            cursor: pointer;
            border: none;
        }

        /* ===== 全屏十字斩处决动画 ===== */
        .vfx-execute-fullscreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            animation: executeBgFlash 1.2s ease-out forwards;
        }
        @keyframes executeBgFlash {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }
        .vfx-execute-fullscreen .cross-slash {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
        }
        .vfx-execute-fullscreen .slash-h,
        .vfx-execute-fullscreen .slash-v {
            position: absolute;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 30%, #fff 48%, #FFD700 50%, #fff 52%, rgba(255,255,255,0.1) 70%, transparent 100%);
            box-shadow: 0 0 40px rgba(255,215,0,0.8), 0 0 80px rgba(255,71,87,0.5), 0 0 120px rgba(255,215,0,0.3);
        }
        .vfx-execute-fullscreen .slash-h {
            top: 50%; left: -10%;
            width: 120%; height: 6px;
            transform: translateY(-50%) rotate(-15deg);
            animation: slashHorizontal 0.6s 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
        }
        .vfx-execute-fullscreen .slash-v {
            left: 50%; top: -10%;
            width: 6px; height: 120%;
            transform: translateX(-50%) rotate(15deg);
            animation: slashVertical 0.6s 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
        }
        @keyframes slashHorizontal {
            0% { opacity: 0; clip-path: inset(0 100% 0 0); }
            20% { opacity: 1; }
            100% { opacity: 0.8; clip-path: inset(0 0 0 0); }
        }
        @keyframes slashVertical {
            0% { opacity: 0; clip-path: inset(100% 0 0 0); }
            20% { opacity: 1; }
            100% { opacity: 0.8; clip-path: inset(0 0 0 0); }
        }
        .vfx-execute-fullscreen .execute-skull {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 120px;
            animation: executeSkullBig 0.8s 0.5s ease-out forwards;
            filter: drop-shadow(0 0 30px rgba(255,71,87,0.9)) drop-shadow(0 0 60px rgba(255,215,0,0.5));
        }
        @keyframes executeSkullBig {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.4) rotate(5deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.9) rotate(0deg); opacity: 0; }
        }
        .vfx-execute-fullscreen .execute-text {
            position: absolute;
            top: 65%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,71,87,0.5);
            letter-spacing: 8px;
            animation: executeTextReveal 0.6s 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes executeTextReveal {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(2); letter-spacing: 20px; }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); letter-spacing: 8px; }
        }

        /* ===== 连击飘字 ===== */
        .combo-float {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 4px 8px rgba(0,0,0,0.5);
            z-index: 500;
            pointer-events: none;
            animation: comboFloatUp 1.5s ease-out forwards;
            letter-spacing: 4px;
        }
        @keyframes comboFloatUp {
            0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.5); }
            30% { opacity: 1; transform: translateX(-50%) translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-80px) scale(0.8); }
        }

        /* ===== 存档管理面板 ===== */
        .save-panel {
            max-width: 500px;
            margin: 0 auto;
        }
        .save-slot {
            background: linear-gradient(135deg, rgba(25,30,60,0.95), rgba(15,18,40,0.98));
            border: 1px solid rgba(255,215,0,0.12);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .save-slot::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
        }
        .save-slot:hover {
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 4px 20px rgba(255,215,0,0.08);
        }
        .save-slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .save-slot-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .save-slot-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .save-slot-info {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .save-slot-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .save-slot-actions {
            display: flex;
            gap: 8px;
        }
        .save-empty {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ===== 魔盒开启动画 ===== */
        .magic-box-anim {
            position: relative;
            display: inline-block;
        }
        .magic-box-anim.opening {
            animation: boxShake 0.4s ease-in-out;
        }
        @keyframes boxShake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-8deg) scale(1.05); }
            40% { transform: rotate(8deg) scale(1.1); }
            60% { transform: rotate(-5deg) scale(1.15); }
            80% { transform: rotate(5deg) scale(1.2); }
        }
        .box-glow-burst {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #FFD700, transparent);
            animation: glowBurst 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes glowBurst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(15); opacity: 0; }
        }
        .card-reveal {
            animation: cardReveal 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardReveal {
            0% { opacity: 0; transform: translateY(20px) scale(0.8); }
            60% { transform: translateY(-5px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 6px;
        }

        /* 战斗日志 */
        .battle-log {
            background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
            border-radius: 12px;
            padding: 16px;
            height: 200px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid rgba(255, 215, 0, 0.08);
            margin-top: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s;
        }

        .log-crit {
            color: var(--accent-gold);
            font-weight: 700;
        }

        .log-heal {
            color: var(--accent-green);
        }

        .log-damage {
            color: var(--accent-red);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 转盘 */
        .wheel-container {
            width: 400px;
            height: 400px;
            margin: 40px auto;
            position: relative;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 8px solid var(--accent-gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            left: 0;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            text-align: center;

    <script>
        // ==================== 粒子背景 ====================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particlesPaused = false;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 切标签页时暂停粒子
        document.addEventListener('visibilitychange', () => {
            particlesPaused = document.hidden;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                const w = window.innerWidth, h = window.innerHeight;
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > w) this.x = 0;
                if (this.x < 0) this.x = w;
                if (this.y > h) this.y = 0;
                if (this.y < 0) this.y = h;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animateParticles() {
            if (!particlesPaused) {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // 页面不可见时暂停粒子
        document.addEventListener('visibilitychange', () => {
            particlesPaused = document.hidden;
        });

        // ==================== 全局音效管理器 ====================
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.muted = false;
                this.masterGain = null;
                this.bgmGain = null;
                this.sfxGain = null;
                this.bgmPlaying = false;
                this.bgmNodes = [];
                this.initialized = false;
                this._bgmGen = 0; // BGM generation counter to prevent stale callbacks
                this.bgmMode = 'normal';
                this.volume = 0.5; // 主音量 0-1
                this.bgmVolume = 0.3;
                this.sfxVolume = 0.6;
            }

            init() {
                if (this.initialized) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = this.volume;
                    this.masterGain.connect(this.ctx.destination);

                    this.bgmGain = this.ctx.createGain();
                    this.bgmGain.gain.value = this.bgmVolume;
                    this.bgmGain.connect(this.masterGain);

                    this.sfxGain = this.ctx.createGain();
                    this.sfxGain.gain.value = this.sfxVolume;
                    this.sfxGain.connect(this.masterGain);

                    this.initialized = true;
                } catch(e) {}
            }

            setVolume(val) {
                this.volume = Math.max(0, Math.min(1, val));
                if (this.masterGain) this.masterGain.gain.setTargetAtTime(this.muted ? 0 : this.volume, this.ctx.currentTime, 0.05);
            }
            setBgmVolume(val) {
                this.bgmVolume = Math.max(0, Math.min(1, val));
                if (this.bgmGain) this.bgmGain.gain.setTargetAtTime(this.bgmVolume, this.ctx.currentTime, 0.05);
            }
            setSfxVolume(val) {
                this.sfxVolume = Math.max(0, Math.min(1, val));
                if (this.sfxGain) this.sfxGain.gain.setTargetAtTime(this.sfxVolume, this.ctx.currentTime, 0.05);
            }

            ensure() {
                if (!this.initialized) this.init();
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            toggleMute() {
                this.muted = !this.muted;
                if (this.masterGain) {
                    this.masterGain.gain.setTargetAtTime(this.muted ? 0 : this.volume, this.ctx.currentTime, 0.1);
                }
                if (!this.muted && !this.bgmPlaying) {
                    if (this.bgmMode === 'battle') {
                        this.startBattleBGM();
                    } else {
                        this.startBGM();
                    }
                }
                return this.muted;
            }

            // ===== 背景音乐：太空环境音 =====
            startBGM() {
                this.ensure();
                if (!this.ctx || this.bgmPlaying) return;
                this.bgmPlaying = true;
                this.bgmMode = 'normal';
                const gen = ++this._bgmGen;
                const ctx = this.ctx;

                // 深空低频 drone
                const droneOsc = ctx.createOscillator();
                const droneGain = ctx.createGain();
                const droneFilter = ctx.createBiquadFilter();
                droneOsc.type = 'sine';
                droneOsc.frequency.value = 55;
                droneFilter.type = 'lowpass';
                droneFilter.frequency.value = 120;
                droneGain.gain.value = 0.4;
                droneOsc.connect(droneFilter).connect(droneGain).connect(this.bgmGain);
                droneOsc.start();
                this.bgmNodes.push(droneOsc, droneGain, droneFilter);

                // 慢速 LFO 调制 drone 音量
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08;
                lfoGain.gain.value = 0.15;
                lfo.connect(lfoGain).connect(droneGain.gain);
                lfo.start();
                this.bgmNodes.push(lfo, lfoGain);

                // 空灵 pad 和弦
                const padNotes = [
                    [130.81, 196.00, 261.63],
                    [146.83, 220.00, 293.66],
                    [116.54, 174.61, 233.08],
                    [123.47, 185.00, 246.94],
                ];
                let chordIdx = 0;

                const playPad = () => {
                    if (this._bgmGen !== gen || !this.bgmPlaying || !this.ctx) return;
                    const chord = padNotes[chordIdx % padNotes.length];
                    chordIdx++;

                    chord.forEach((freq) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        const filter = ctx.createBiquadFilter();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        filter.type = 'lowpass';
                        filter.frequency.value = 400;
                        const now = ctx.currentTime;
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.12, now + 2);
                        gain.gain.linearRampToValueAtTime(0.08, now + 6);
                        gain.gain.linearRampToValueAtTime(0, now + 10);
                        osc.connect(filter).connect(gain).connect(this.bgmGain);
                        osc.start(now);
                        osc.stop(now + 10.5);
                        this.bgmNodes.push(osc, gain, filter);
                    });

                    if (Math.random() > 0.4) {
                        const delay = Math.random() * 4;
                        const sparkleFreq = [523, 659, 784, 880, 1047][Math.floor(Math.random() * 5)];
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        const filter = ctx.createBiquadFilter();
                        osc.type = 'sine';
                        osc.frequency.value = sparkleFreq;
                        filter.type = 'highpass';
                        filter.frequency.value = 300;
                        const now = ctx.currentTime;
                        gain.gain.setValueAtTime(0, now + delay);
                        gain.gain.linearRampToValueAtTime(0.05, now + delay + 0.3);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 3);
                        osc.connect(filter).connect(gain).connect(this.bgmGain);
                        osc.start(now + delay);
                        osc.stop(now + delay + 3.5);
                        this.bgmNodes.push(osc, gain, filter);
                    }

                    if (this.bgmPlaying && this._bgmGen === gen) {
                        setTimeout(playPad, 8000);
                    }
                    // 定期清理已停止的节点，防止内存堆积
                    if (this.bgmNodes.length > 100) {
                        this.bgmNodes = this.bgmNodes.filter(n => {
                            try { return n.context && n.context.state !== 'closed'; } catch { return false; }
                        });
                    }
                };

                playPad();
            }

            stopBGM() {
                this.bgmPlaying = false;
                this._bgmGen++; // invalidate any pending callbacks
                this.bgmNodes.forEach(n => {
                    try { n.stop && n.stop(); } catch(e) {}
                    try { n.disconnect(); } catch(e) {}
                });
                this.bgmNodes = [];
            }

            // ===== 战斗 BGM =====
            startBattleBGM() {
                this.ensure();
                if (!this.ctx) return;
                this.stopBGM();
                this.bgmPlaying = true;
                this.bgmMode = 'battle';
                const gen = ++this._bgmGen;
                const ctx = this.ctx;

                const bassOsc = ctx.createOscillator();
                const bassGain = ctx.createGain();
                const bassFilter = ctx.createBiquadFilter();
                bassOsc.type = 'sawtooth';
                bassOsc.frequency.value = 45;
                bassFilter.type = 'lowpass';
                bassFilter.frequency.value = 100;
                bassGain.gain.value = 0.35;
                bassOsc.connect(bassFilter).connect(bassGain).connect(this.bgmGain);
                bassOsc.start();
                this.bgmNodes.push(bassOsc, bassGain, bassFilter);

                const bassLfo = ctx.createOscillator();
                const bassLfoGain = ctx.createGain();
                bassLfo.type = 'sine';
                bassLfo.frequency.value = 2.0;
                bassLfoGain.gain.value = 0.2;
                bassLfo.connect(bassLfoGain).connect(bassGain.gain);
                bassLfo.start();
                this.bgmNodes.push(bassLfo, bassLfoGain);

                const battleChords = [
                    [110.00, 130.81, 164.81],
                    [116.54, 146.83, 174.61],
                    [98.00, 116.54, 146.83],
                    [103.83, 123.47, 155.56],
                ];
                let chordIdx = 0;

                const playBattlePad = () => {
                    if (this._bgmGen !== gen || !this.bgmPlaying || !this.ctx) return;
                    const chord = battleChords[chordIdx % battleChords.length];
                    chordIdx++;

                    chord.forEach((freq) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        const filter = ctx.createBiquadFilter();
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq;
                        filter.type = 'lowpass';
                        filter.frequency.value = 300;
                        const now = ctx.currentTime;
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.06, now + 0.5);
                        gain.gain.setValueAtTime(0.06, now + 3);
                        gain.gain.linearRampToValueAtTime(0, now + 4);
                        osc.connect(filter).connect(gain).connect(this.bgmGain);
                        osc.start(now);
                        osc.stop(now + 4.2);
                        this.bgmNodes.push(osc, gain, filter);
                    });

                    if (Math.random() > 0.3) {
                        const tensionNotes = [440, 466.16, 523.25, 554.37, 587.33];
                        const note = tensionNotes[Math.floor(Math.random() * tensionNotes.length)];
                        const delay = Math.random() * 2;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = note;
                        const now = ctx.currentTime;
                        gain.gain.setValueAtTime(0, now + delay);
                        gain.gain.linearRampToValueAtTime(0.04, now + delay + 0.2);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 2);
                        osc.connect(gain).connect(this.bgmGain);
                        osc.start(now + delay);
                        osc.stop(now + delay + 2.2);
                        this.bgmNodes.push(osc, gain);
                    }

                    if (this.bgmPlaying && this._bgmGen === gen) {
                        setTimeout(playBattlePad, 4000);
                    }
                };
                playBattlePad();

                const playKick = () => {
                    if (this._bgmGen !== gen || !this.bgmPlaying || !this.ctx) return;
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
                    gain.gain.setValueAtTime(0.18, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.connect(gain).connect(this.bgmGain);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    this.bgmNodes.push(osc, gain);

                    if (this._kickToggle) {
                        const noise = ctx.createOscillator();
                        const noiseGain = ctx.createGain();
                        const hihatFilter = ctx.createBiquadFilter();
                        noise.type = 'square';
                        noise.frequency.value = 6000;
                        hihatFilter.type = 'highpass';
                        hihatFilter.frequency.value = 5000;
                        noiseGain.gain.setValueAtTime(0.04, now);
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                        noise.connect(hihatFilter).connect(noiseGain).connect(this.bgmGain);
                        noise.start(now);
                        noise.stop(now + 0.08);
                        this.bgmNodes.push(noise, noiseGain, hihatFilter);
                    }
                    this._kickToggle = !this._kickToggle;

                    if (this.bgmPlaying && this._bgmGen === gen) {
                        setTimeout(playKick, 500);
                    }
                };
                this._kickToggle = false;
                playKick();
            }

                this.stopBGM();
                this.bgmMode = 'normal';
            }
